<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — EventStar</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
<style>
  body { background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); min-height: 100vh; }
  .login-card { border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
  .login-left { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,180,0,0.1) 100%); }
  .role-tab.active { background: var(--accent); color: white !important; }
  .role-tab { cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
  .role-tab:hover { border-color: var(--accent); }
  .credential-hint { background: rgba(123,47,190,0.08); border-radius: 8px; padding: 0.5rem 0.75rem; font-size: 0.8rem; }
</style>
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-xl-9 col-lg-10">
      <div class="login-card card">
        <div class="row g-0">
          <!-- Left Panel -->
          <div class="col-lg-5 login-left d-none d-lg-flex flex-column align-items-center justify-content-center text-center p-5" style="background: var(--primary)">
            <div style="font-size: 5rem; margin-bottom: 1rem">
              <i class="bi bi-stars fs-1" style="color: var(--gold)"><b>EventStar</b></i>
            </div>
            <h3 class="fw-800 text-white">Welcome Back!</h3>
            <p class="text-white opacity-75 mb-4">Sign in to access your dashboard and manage events</p>
            <!--div class="d-flex flex-column gap-2 w-100">
              <div class="credential-hint text-white-50">
                <strong class="text-white">Demo Accounts:</strong>
              </div>
              <div class="credential-hint text-white-50 small">
                <i class="bi bi-person me-1"></i>student@college.edu / student123
              </div>
              <div class="credential-hint text-white-50 small">
                <i class="bi bi-person-badge me-1"></i>participant@college.edu / part123
              </div>
              <div class="credential-hint text-white-50 small">
                <i class="bi bi-clipboard-check me-1"></i>judge@college.edu / judge123
              </div>
              <div class="credential-hint text-white-50 small">
                <i class="bi bi-shield-lock me-1"></i>admin@college.edu / admin123
              </div>
            </div-->
          </div>

          <!-- Right Panel -->
          <div class="col-lg-7 p-4 p-lg-5">
            <a href="index.html" class="text-decoration-none d-flex align-items-center gap-2 mb-4">
              <i class="bi bi-arrow-left text-muted"></i>
              <span class="text-muted small">Back to home</span>
            </a>
            <h4 class="fw-700 mb-1" style="color: var(--primary)">Sign In</h4>
            <p class="text-muted small mb-4">Select your role and enter your credentials</p>

            <!-- Role Tabs -->
            <div class="row g-2 mb-4">
              <div class="col-6 col-md-3">
                <div class="role-tab card text-center p-2 rounded-3 active" data-role="student" onclick="selectRole('student', this)">
                  <i class="bi bi-mortarboard fs-4 mb-1 d-block"></i>
                  <small class="fw-600">Student</small>
                </div>
              </div>
              <div class="col-6 col-md-3">
                <div class="role-tab card text-center p-2 rounded-3" data-role="participant" onclick="selectRole('participant', this)">
                  <i class="bi bi-person-badge fs-4 mb-1 d-block"></i>
                  <small class="fw-600">Participant</small>
                </div>
              </div>
              <div class="col-6 col-md-3">
                <div class="role-tab card text-center p-2 rounded-3" data-role="judge" onclick="selectRole('judge', this)">
                  <i class="bi bi-clipboard-check fs-4 mb-1 d-block"></i>
                  <small class="fw-600">Judge</small>
                </div>
              </div>
              <div class="col-6 col-md-3">
                <div class="role-tab card text-center p-2 rounded-3" data-role="admin" onclick="selectRole('admin', this)">
                  <i class="bi bi-shield-lock fs-4 mb-1 d-block"></i>
                  <small class="fw-600">Admin</small>
                </div>
              </div>
            </div>

            <!-- Login Form -->
            <form id="login-form" novalidate>
              <input type="hidden" id="selected-role" value="student">
              <div class="mb-3">
                <label class="form-label fw-600 small">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input type="email" id="login-email" class="form-control" placeholder="your@email.com" required>
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-600 small">Password</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                  <button type="button" class="input-group-text" onclick="togglePwd()">
                    <i class="bi bi-eye" id="pwd-eye"></i>
                  </button>
                </div>
              </div>
              <div id="login-error" class="alert alert-danger py-2 small d-none"></div>
              <button type="submit" class="btn btn-primary-custom w-100 py-2 fw-600" id="login-btn">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
              </button>
            </form>

            <div class="text-center mt-4">
              <span class="text-muted small">Don't have an account? </span>
              <a href="register.html" class="text-decoration-none fw-600" style="color: var(--accent)">Register Now</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
function selectRole(role, el) {
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('selected-role').value = role;
}

function togglePwd() {
  const pwd = document.getElementById('login-password');
  const eye = document.getElementById('pwd-eye');
  if (pwd.type === 'password') {
    pwd.type = 'text'; eye.className = 'bi bi-eye-slash';
  } else {
    pwd.type = 'password'; eye.className = 'bi bi-eye';
  }
}

// Pre-select role from URL param
const urlRole = new URLSearchParams(window.location.search).get('role');
if (urlRole) {
  const el = document.querySelector(`.role-tab[data-role="${urlRole}"]`);
  if (el) selectRole(urlRole, el);
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const role = document.getElementById('selected-role').value;
  const errorEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  if (!email || !password) {
    errorEl.textContent = 'Please enter your email and password';
    errorEl.classList.remove('d-none');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';
  errorEl.classList.add('d-none');

  try {
    const res = await fetch('cgi-bin/login.py', {
      method: 'POST',
      body: new URLSearchParams({ email, password, role })
    });
    const data = await res.json();

    if (data.status === 'success') {
      localStorage.setItem('user', JSON.stringify({
        user_id: data.user_id,
        full_name: data.full_name,
        email: data.email,
        role: data.role,
        photo: data.photo || '',
        bio: data.bio || ''
      }));

      showToast(`Welcome back, ${data.full_name}!`, 'success');

      setTimeout(() => {
        const redirects = {
          student: 'student/dashboard.html',
          participant: 'participant/dashboard.html',
          judge: 'judge/dashboard.html',
          admin: 'admin/dashboard.html'
        };
        window.location.href = redirects[data.role] || 'index.html';
      }, 800);
    } else {
      errorEl.textContent = data.message || 'Invalid credentials';
      errorEl.classList.remove('d-none');
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Sign In';
    }
  } catch(err) {
    errorEl.textContent = 'Connection error. Is the server running?';
    errorEl.classList.remove('d-none');
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Sign In';
  }
});
</script>
</body>
</html>
