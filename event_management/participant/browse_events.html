<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Events — Participant</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/participant.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>
<nav class="navbar navbar-expand-lg participant-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="bi bi-stars me-2"></i>EventStar</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list text-white fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="browse_events.html">Events</a></li>
        <li class="nav-item"><a class="nav-link" href="my_applications.html">My Applications</a></li>
        <li class="nav-item"><a class="nav-link" href="my_scores.html">My Scores</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small" id="nav-user-name"></span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
      </div>
    </div>
  </div>
</nav>
<div class="student-hero" style="background:linear-gradient(135deg,var(--primary),#4a0080)">
  <div class="container py-3">
    <h4 class="fw-700 text-white mt-2 mb-0"><i class="bi bi-calendar-event me-2"></i>Open Events</h4>
    <p class="text-white-50 mb-0 small">Events accepting registrations</p>
  </div>
</div>
<div class="container py-4">
  <div class="row g-4" id="events-grid">
    <div class="col-12 text-center py-5"><div class="spinner-border text-accent"></div></div>
  </div>
</div>
<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('participant');
if (user) {
  document.getElementById('nav-user-name').textContent = user.full_name;
  fetch('../cgi-bin/get_events.py').then(r => r.json()).then(data => {
    const grid = document.getElementById('events-grid');
    if (data.status === 'success' && data.data.length > 0) {
      const today = new Date().toISOString().split('T')[0];
      const open = data.data.filter(e => e.status !== 'Cancelled' && e.status !== 'Completed' && (!e.registration_deadline || e.registration_deadline >= today));
      if (open.length === 0) {
        grid.innerHTML = '<div class="col-12"><div class="empty-state"><i class="bi bi-calendar-x"></i><p>No events open for registration</p></div></div>';
        return;
      }
      grid.innerHTML = open.map((ev, i) => `
        <div class="col-md-6 col-lg-4 fade-in" style="animation-delay:${i*0.1}s">
          <div class="card h-100">
            <img src="../${ev.poster_image || 'uploads/events/default_poster.jpg'}" alt="${ev.title}" class="card-img-top" style="height:200px; object-fit:cover; border-bottom: 2px solid var(--accent);">
            <div class="card-body d-flex flex-column">
              <div class="d-flex gap-2 mb-2">
                <span class="badge" style="background:rgba(75,0,128,0.1);color:#4a0080">${ev.category_name || ''}</span>
                ${getStatusBadge(ev.status)}
              </div>
              <h5 class="fw-700">${ev.title}</h5>
              <p class="text-muted small flex-grow-1">${(ev.description || '').substring(0,100)}...</p>
              <div class="small text-muted mb-3">
                <div><i class="bi bi-calendar me-1"></i>${formatDate(ev.event_date)}</div>
                <div><i class="bi bi-clock me-1"></i>Apply by: ${formatDate(ev.registration_deadline)}</div>
                <div><i class="bi bi-geo-alt me-1"></i>${ev.venue || '—'}</div>
              </div>
              <a href="apply_event.html?event_id=${ev.event_id}" class="btn btn-primary-custom w-100">
                <i class="bi bi-send me-2"></i>Apply Now
              </a>
            </div>
          </div>
        </div>`).join('');
    } else {
      grid.innerHTML = '<div class="col-12"><div class="empty-state"><i class="bi bi-calendar-x"></i><p>No events available</p></div></div>';
    }
  });
}
</script>
</body>
</html>
