<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply for Event — EventStar</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/participant.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>
<nav class="navbar navbar-expand-lg participant-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="bi bi-stars me-2"></i>EventStar</a>
    <div class="navbar-nav ms-auto flex-row gap-2">
      <span class="text-white-50 small align-self-center" id="nav-user-name"></span>
      <button onclick="logout()" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </div>
</nav>
<div class="student-hero" style="background:linear-gradient(135deg,var(--primary),#4a0080)">
  <div class="container py-3">
    <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a href="browse_events.html" class="text-white-50 text-decoration-none">Events</a></li>
      <li class="breadcrumb-item text-white active">Apply</li>
    </ol></nav>
    <h4 class="fw-700 text-white mt-2 mb-0"><i class="bi bi-send me-2"></i>Apply for Event</h4>
  </div>
</div>
<div class="container py-4">
  <div class="apply-form-card">
    <div id="event-info" class="mb-4 p-3 rounded-3" style="background:var(--light-bg)">
      <div class="text-center"><div class="spinner-border spinner-border-sm text-accent"></div></div>
    </div>
    <form id="apply-form" novalidate>
      <input type="hidden" id="event-id">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-600 small">Performance Title *</label>
          <input type="text" id="perf-title" class="form-control" placeholder="Name of your act/performance" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-600 small">Category Entry</label>
          <input type="text" id="cat-entry" class="form-control" placeholder="e.g. Classical Dance, Solo Singing">
        </div>
        <div class="col-12">
          <label class="form-label fw-600 small">About Your Performance</label>
          <textarea id="bio" class="form-control" rows="4" placeholder="Describe your performance and what makes it special..."></textarea>
        </div>
        <div class="col-12">
          <label class="form-label fw-600 small">Profile / Performance Photo</label>
          <div class="d-flex align-items-center gap-3">
            <img id="photo-preview" class="photo-preview" src="" alt="Preview">
            <div>
              <input type="file" id="photo-input" class="form-control" accept="image/*" onchange="previewPhoto(this)">
              <small class="text-muted">JPG, PNG up to 5MB. This will update your profile photo.</small>
            </div>
          </div>
        </div>
      </div>
      <div id="apply-error" class="alert alert-danger py-2 small mt-3 d-none"></div>
      <div id="apply-success" class="alert alert-success py-2 small mt-3 d-none"></div>
      <div class="d-flex gap-3 mt-4">
        <a href="browse_events.html" class="btn btn-outline-secondary flex-fill">Cancel</a>
        <button type="submit" class="btn btn-primary-custom flex-fill" id="apply-btn">
          <i class="bi bi-send me-2"></i>Submit Application
        </button>
      </div>
    </form>
  </div>
</div>
<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('participant');
const eventId = new URLSearchParams(window.location.search).get('event_id');

if (user) {
  document.getElementById('nav-user-name').textContent = user.full_name;
  document.getElementById('event-id').value = eventId || '';

  if (eventId) {
    fetch('../cgi-bin/get_event_detail.py?event_id=' + eventId).then(r => r.json()).then(data => {
      if (data.status === 'success') {
        const ev = data.event;
        document.getElementById('event-info').innerHTML =
          '<div class="d-flex align-items-center gap-3">' +
          '<div class="rounded-3" style="width:60px;height:60px; overflow:hidden; border:2px solid var(--accent);"><img src="../' + (ev.poster_image || 'uploads/events/default_poster.jpg') + '" style="width:100%; height:100%; object-fit:cover;"></div>' +
          '<div><h6 class="fw-700 mb-0">' + ev.title + '</h6><small class="text-muted"><i class="bi bi-calendar me-1"></i>' + formatDate(ev.event_date) + ' &bull; <i class="bi bi-geo-alt me-1"></i>' + (ev.venue || '') + '</small></div></div>';
      }
    });
  }
}

function previewPhoto(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('photo-preview');
      img.src = e.target.result;
      img.style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

document.getElementById('apply-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const perfTitle = document.getElementById('perf-title').value.trim();
  const eid = document.getElementById('event-id').value;
  const errorEl = document.getElementById('apply-error');
  const successEl = document.getElementById('apply-success');
  const btn = document.getElementById('apply-btn');

  errorEl.classList.add('d-none');
  successEl.classList.add('d-none');

  if (!perfTitle || !eid) {
    errorEl.textContent = 'Performance title and event are required';
    errorEl.classList.remove('d-none'); return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Submitting...';

  const formData = new FormData();
  formData.append('user_id', user.user_id);
  formData.append('event_id', eid);
  formData.append('performance_title', perfTitle);
  formData.append('category_entry', document.getElementById('cat-entry').value.trim());
  formData.append('bio', document.getElementById('bio').value.trim());
  const photo = document.getElementById('photo-input').files[0];
  if (photo) formData.append('photo', photo);

  try {
    const res = await fetch('../cgi-bin/apply_event.py', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.status === 'success') {
      successEl.textContent = 'Application submitted! Redirecting...';
      successEl.classList.remove('d-none');
      setTimeout(() => window.location.href = 'my_applications.html', 1500);
    } else {
      errorEl.textContent = data.message || 'Failed to submit';
      errorEl.classList.remove('d-none');
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-send me-2"></i>Submit Application';
    }
  } catch(err) {
    errorEl.textContent = 'Connection error';
    errorEl.classList.remove('d-none');
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-send me-2"></i>Submit Application';
  }
});
</script>
</body>
</html>
