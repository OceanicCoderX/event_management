<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Participant Dashboard — EventStar</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/participant.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>

<nav class="navbar navbar-expand-lg participant-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="bi bi-stars me-2"></i>EventStar</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list text-white fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="browse_events.html">Events</a></li>
        <li class="nav-item"><a class="nav-link" href="my_applications.html">My Applications</a></li>
        <li class="nav-item"><a class="nav-link" href="my_scores.html">My Scores</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small" id="nav-user-name"></span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="student-hero" style="background:linear-gradient(135deg,var(--primary),#4a0080)">
  <div class="container py-3">
    <h4 class="fw-700 text-white mt-2 mb-0">Welcome, <span id="welcome-name">Participant</span>! 🌟</h4>
    <p class="text-white-50 mb-0 small">Track your applications and scores</p>
  </div>
</div>

<div class="container py-4">
  <div class="row g-3 mb-4">
    <div class="col-md-3 fade-in-1">
      <div class="card admin-stat-card purple h-100">
        <div class="d-flex align-items-center gap-3">
          <div style="font-size:1.8rem"><i class="bi bi-send text-accent"></i></div>
          <div><h3 class="fw-800 mb-0 text-accent" id="stat-apps">—</h3><p class="mb-0 text-muted small">Applications</p></div>
        </div>
      </div>
    </div>
    <div class="col-md-3 fade-in-2">
      <div class="card admin-stat-card green h-100">
        <div class="d-flex align-items-center gap-3">
          <div style="font-size:1.8rem"><i class="bi bi-check-circle text-success"></i></div>
          <div><h3 class="fw-800 mb-0 text-success" id="stat-approved">—</h3><p class="mb-0 text-muted small">Approved</p></div>
        </div>
      </div>
    </div>
    <div class="col-md-3 fade-in-3">
      <div class="card admin-stat-card red h-100">
        <div class="d-flex align-items-center gap-3">
          <div style="font-size:1.8rem"><i class="bi bi-x-circle text-danger"></i></div>
          <div><h3 class="fw-800 mb-0 text-danger" id="stat-rejected">—</h3><p class="mb-0 text-muted small">Rejected</p></div>
        </div>
      </div>
    </div>
    <div class="col-md-3 fade-in-4">
      <div class="card admin-stat-card gold h-100">
        <div class="d-flex align-items-center gap-3">
          <div style="font-size:1.8rem"><i class="bi bi-trophy" style="color:var(--gold)"></i></div>
          <div><h3 class="fw-800 mb-0" style="color:var(--gold)" id="stat-rank">—</h3><p class="mb-0 text-muted small">Best Rank</p></div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-lg-8">
      <div class="card p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="fw-700 mb-0"><i class="bi bi-list-check me-2 text-accent"></i>My Applications</h6>
          <a href="my_applications.html" class="btn btn-sm btn-outline-primary">View All</a>
        </div>
        <div id="apps-list">
          <div class="text-center py-3"><div class="spinner-border spinner-border-sm text-accent"></div></div>
        </div>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="card p-3">
        <h6 class="fw-700 mb-3"><i class="bi bi-lightning me-2 text-warning"></i>Quick Actions</h6>
        <a href="browse_events.html" class="btn btn-primary-custom w-100 mb-2">
          <i class="bi bi-search me-2"></i>Browse Events
        </a>
        <a href="my_scores.html" class="btn btn-outline-primary w-100 mb-2">
          <i class="bi bi-bar-chart me-2"></i>View My Scores
        </a>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('participant');
if (user) {
  document.getElementById('welcome-name').textContent = user.full_name.split(' ')[0];
  document.getElementById('nav-user-name').textContent = user.full_name;

  fetch('../cgi-bin/get_my_applications.py?user_id=' + user.user_id)
    .then(r => r.json()).then(data => {
      if (data.status === 'success') {
        const apps = data.data;
        document.getElementById('stat-apps').textContent = apps.length;
        document.getElementById('stat-approved').textContent = apps.filter(a => a.status === 'Approved').length;
        document.getElementById('stat-rejected').textContent = apps.filter(a => a.status === 'Rejected').length;

        if (apps.length === 0) {
          document.getElementById('apps-list').innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>No applications yet. <a href="browse_events.html">Apply now!</a></p></div>';
          document.getElementById('stat-rank').textContent = '—';
        } else {
          document.getElementById('apps-list').innerHTML = apps.slice(0,3).map(a => `
            <div class="d-flex align-items-center gap-3 p-2 rounded-3 mb-2" style="background:var(--light-bg)">
              <div class="flex-grow-1">
                <div class="fw-600 small">${a.event_title}</div>
                <div class="text-muted" style="font-size:0.75rem">${a.performance_title || ''} • ${formatDate(a.registered_at)}</div>
              </div>
              <div>${getStatusBadge(a.status)}</div>
            </div>`).join('');

          // Best rank
          const promises = apps.filter(a => a.status === 'Approved').map(a =>
            fetch('../cgi-bin/get_my_scores.py?user_id=' + user.user_id + '&event_id=' + a.event_id).then(r => r.json()).catch(() => null)
          );
          Promise.all(promises).then(results => {
            const ranks = results.filter(r => r && r.rank).map(r => r.rank);
            document.getElementById('stat-rank').textContent = ranks.length > 0 ? '#' + Math.min(...ranks) : '—';
          });
        }
      }
    });
}
</script>
</body>
</html>
