<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Applications — EventStar</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/participant.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>
<nav class="navbar navbar-expand-lg participant-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="bi bi-stars me-2"></i>EventStar</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list text-white fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="browse_events.html">Events</a></li>
        <li class="nav-item"><a class="nav-link active" href="my_applications.html">My Applications</a></li>
        <li class="nav-item"><a class="nav-link" href="my_scores.html">My Scores</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small" id="nav-user-name"></span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
      </div>
    </div>
  </div>
</nav>
<div class="student-hero" style="background:linear-gradient(135deg,var(--primary),#4a0080)">
  <div class="container py-3">
    <h4 class="fw-700 text-white mt-2 mb-0"><i class="bi bi-list-check me-2"></i>My Applications</h4>
  </div>
</div>
<div class="container py-4">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center" style="background:white;border-bottom:2px solid var(--light-bg)">
      <h6 class="fw-700 mb-0">All Applications</h6>
      <a href="browse_events.html" class="btn btn-sm btn-primary-custom"><i class="bi bi-plus me-1"></i>Apply for Event</a>
    </div>
    <div class="table-responsive">
      <table class="table table-hover mb-0 applications-table">
        <thead style="background:var(--light-bg)">
          <tr>
            <th>Event</th>
            <th>Performance Title</th>
            <th>Applied On</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="apps-tbody">
          <tr><td colspan="5" class="text-center py-4"><div class="spinner-border spinner-border-sm text-accent"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('participant');
if (user) {
  document.getElementById('nav-user-name').textContent = user.full_name;
  fetch('../cgi-bin/get_my_applications.py?user_id=' + user.user_id)
    .then(r => r.json()).then(data => {
      const tbody = document.getElementById('apps-tbody');
      if (data.status === 'success' && data.data.length > 0) {
        tbody.innerHTML = data.data.map(a => `
          <tr>
            <td>
              <div class="event-name">${a.event_title}</div>
              <small class="text-muted">${formatDate(a.event_date)} &bull; ${a.category_name || ''}</small>
            </td>
            <td><div class="small">${a.performance_title || '—'}</div></td>
            <td><small>${formatDate(a.registered_at)}</small></td>
            <td>${getStatusBadge(a.status)}</td>
            <td>
              ${a.status === 'Approved' ? `<a href="my_scores.html?event_id=${a.event_id}" class="btn btn-sm btn-outline-primary"><i class="bi bi-bar-chart me-1"></i>Scores</a>` : ''}
            </td>
          </tr>`).join('');
      } else {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><i class="bi bi-inbox"></i><p>No applications yet. <a href="browse_events.html">Apply now!</a></p></div></td></tr>';
      }
    });
}
</script>
</body>
</html>
