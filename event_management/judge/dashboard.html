<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judge Dashboard — EventStar</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/judge.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>
<nav class="navbar navbar-expand-lg judge-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="bi bi-stars me-2"></i>EventStar</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list text-white fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="my_events.html">My Events</a></li>
        <li class="nav-item"><a class="nav-link" href="view_scores.html">View Scores</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small" id="nav-user-name"></span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
      </div>
    </div>
  </div>
</nav>
<div class="student-hero" style="background:linear-gradient(135deg,#1a003a,var(--primary))">
  <div class="container py-3">
    <h4 class="fw-700 text-white mt-2 mb-0">Welcome, Judge <span id="welcome-name">—</span>! ⚖️</h4>
    <p class="text-white-50 mb-0 small">Score and evaluate participants</p>
  </div>
</div>
<div class="container py-4">
  <div class="row g-3 mb-4">
    <div class="col-md-4 fade-in-1">
      <div class="card admin-stat-card purple h-100">
        <div class="d-flex align-items-center gap-3">
          <div style="font-size:1.8rem"><i class="bi bi-calendar-check text-accent"></i></div>
          <div><h3 class="fw-800 mb-0 text-accent" id="stat-assigned">—</h3><p class="mb-0 text-muted small">Assigned Events</p></div>
        </div>
      </div>
    </div>
    <div class="col-md-4 fade-in-2">
      <div class="card admin-stat-card gold h-100">
        <div class="d-flex align-items-center gap-3">
          <div style="font-size:1.8rem"><i class="bi bi-hourglass" style="color:var(--gold)"></i></div>
          <div><h3 class="fw-800 mb-0" style="color:var(--gold)" id="stat-pending">—</h3><p class="mb-0 text-muted small">Pending Scoring</p></div>
        </div>
      </div>
    </div>
    <div class="col-md-4 fade-in-3">
      <div class="card admin-stat-card green h-100">
        <div class="d-flex align-items-center gap-3">
          <div style="font-size:1.8rem"><i class="bi bi-check-circle text-success"></i></div>
          <div><h3 class="fw-800 mb-0 text-success" id="stat-done">—</h3><p class="mb-0 text-muted small">Completed</p></div>
        </div>
      </div>
    </div>
  </div>
  <div class="card p-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h6 class="fw-700 mb-0"><i class="bi bi-calendar me-2 text-accent"></i>My Assigned Events</h6>
      <a href="my_events.html" class="btn btn-sm btn-outline-primary">View All</a>
    </div>
    <div id="events-list">
      <div class="text-center py-3"><div class="spinner-border spinner-border-sm text-accent"></div></div>
    </div>
  </div>
</div>
<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('judge');
if (user) {
  document.getElementById('welcome-name').textContent = user.full_name.split(' ')[0];
  document.getElementById('nav-user-name').textContent = user.full_name;

  fetch('../cgi-bin/get_judge_events.py?judge_user_id=' + user.user_id).then(r => r.json()).then(data => {
    if (data.status === 'success') {
      const events = data.data;
      document.getElementById('stat-assigned').textContent = events.length;
      const pending = events.filter(e => e.scored_count < e.participant_count && !e.scores_locked).length;
      const done = events.filter(e => e.scored_count >= e.participant_count && e.participant_count > 0).length;
      document.getElementById('stat-pending').textContent = pending;
      document.getElementById('stat-done').textContent = done;

      if (events.length === 0) {
        document.getElementById('events-list').innerHTML = '<div class="empty-state"><i class="bi bi-calendar-x"></i><p>No events assigned yet</p></div>';
      } else {
        document.getElementById('events-list').innerHTML = events.map(ev => {
          const allScored = ev.scored_count >= ev.participant_count && ev.participant_count > 0;
          return `<div class="event-assignment-card ${allScored ? 'completed' : ''} ${ev.scores_locked ? 'locked' : ''}">
            <div class="d-flex align-items-center justify-content-between gap-3">
              <div class="flex-grow-1">
                <h6 class="fw-700 mb-1">${ev.title}</h6>
                <div class="small text-muted">
                  <i class="bi bi-calendar me-1"></i>${formatDate(ev.event_date)} &bull;
                  <i class="bi bi-people me-1"></i>${ev.participant_count} participants &bull;
                  Scored: ${ev.scored_count}/${ev.participant_count}
                </div>
              </div>
              <div class="d-flex flex-column gap-1 align-items-end">
                ${ev.scores_locked ? '<span class="badge bg-danger"><i class="bi bi-lock me-1"></i>Locked</span>' : getStatusBadge(ev.status)}
                <a href="score_participants.html?event_id=${ev.event_id}" class="btn btn-sm btn-primary-custom">
                  <i class="bi bi-pencil me-1"></i>${ev.scores_locked ? 'View Scores' : 'Score'}
                </a>
              </div>
            </div>
          </div>`;
        }).join('');
      }
    }
  });
}
</script>
</body>
</html>
