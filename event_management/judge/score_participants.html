<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score Participants — Judge</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/judge.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>
<nav class="navbar navbar-expand-lg judge-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="bi bi-stars me-2"></i>EventStar</a>
    <div class="navbar-nav ms-auto flex-row gap-2 align-items-center">
      <a href="my_events.html" class="nav-link text-white-50 small"><i class="bi bi-arrow-left me-1"></i>My Events</a>
      <span class="text-white-50 small" id="nav-user-name"></span>
      <button onclick="logout()" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </div>
</nav>

<div id="page-content">
  <div class="text-center py-5"><div class="spinner-border text-accent"></div></div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('judge');
const eventId = new URLSearchParams(window.location.search).get('event_id');

if (user && eventId) {
  document.getElementById('nav-user-name').textContent = user.full_name;

  fetch('../cgi-bin/get_participants_to_score.py?judge_user_id=' + user.user_id + '&event_id=' + eventId)
    .then(r => r.json()).then(data => {
      if (data.status !== 'success') {
        document.getElementById('page-content').innerHTML = '<div class="container py-4"><div class="alert alert-danger">' + (data.message || 'Failed') + '</div></div>';
        return;
      }
      const ev = data.event;
      const locked = ev && ev.scores_locked;
      const participants = data.participants;
      const criteria = data.criteria;
      const existingScores = data.existing_scores;

      let headerHtml = `
        <div class="student-hero" style="background:linear-gradient(135deg,#1a003a,var(--primary))">
          <div class="container py-3">
            <h4 class="fw-700 text-white mt-2 mb-0"><i class="bi bi-pencil me-2"></i>Score Participants</h4>
            <p class="text-white-50 mb-0 small">${ev ? ev.title : ''}</p>
          </div>
        </div>`;

      if (locked) {
        headerHtml += '<div class="container mt-3"><div class="locked-banner"><i class="bi bi-lock-fill fs-4"></i><span>Scoring has been locked by Admin. You can view scores but cannot make changes.</span></div></div>';
      }

      if (participants.length === 0) {
        document.getElementById('page-content').innerHTML = headerHtml + '<div class="container py-4"><div class="empty-state"><i class="bi bi-people"></i><h5>No approved participants yet</h5></div></div>';
        return;
      }

      const scoringHtml = participants.map(p => {
        const criteriaInputs = criteria.map(c => {
          const key = p.participant_id + '_' + c.criteria_id;
          const existing = existingScores[key];
          return `<div class="criteria-row">
            <div>
              <div class="fw-600 small">${c.criteria_name}</div>
              <div class="criteria-max">${c.description || ''} | Max: ${c.max_marks}</div>
            </div>
            <div class="d-flex align-items-center gap-2">
              <input type="number" 
                class="criteria-input score-input" 
                id="score_${p.participant_id}_${c.criteria_id}"
                data-participant="${p.participant_id}" 
                data-criteria="${c.criteria_id}"
                data-max="${c.max_marks}"
                value="${existing !== undefined ? existing : ''}"
                min="0" max="${c.max_marks}" step="0.5"
                ${locked ? 'disabled' : ''}
                placeholder="0">
              <span class="text-muted small">/${c.max_marks}</span>
            </div>
          </div>`;
        }).join('');

        return `<div class="scoring-card">
          <div class="participant-header">
            <div class="rounded-circle d-flex align-items-center justify-content-center fw-700 text-white" style="width:50px;height:50px;background:rgba(255,255,255,0.2);font-size:1.2rem;flex-shrink:0">${p.full_name.charAt(0)}</div>
            <div>
              <h6 class="fw-700 mb-0">${p.full_name}</h6>
              <small class="opacity-75">${p.performance_title || ''} ${p.category_entry ? '• ' + p.category_entry : ''}</small>
            </div>
          </div>
          <div class="criteria-table">${criteriaInputs}</div>
        </div>`;
      }).join('');

      document.getElementById('page-content').innerHTML = headerHtml + `
        <div class="container py-4">
          ${scoringHtml}
          ${!locked ? `
          <div class="d-flex justify-content-between align-items-center mt-4">
            <a href="my_events.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
            <button class="btn btn-primary-custom btn-lg px-5" id="submit-all-btn" onclick="submitAllScores()">
              <i class="bi bi-check-circle me-2"></i>Save All Scores
            </button>
          </div>` : ''}
        </div>`;

      // Validate inputs
      document.querySelectorAll('.score-input').forEach(input => {
        input.addEventListener('change', function() {
          const max = parseFloat(this.dataset.max);
          if (parseFloat(this.value) > max) {
            this.value = max;
            showToast('Max marks for this criteria is ' + max, 'warning');
          }
          if (parseFloat(this.value) < 0) this.value = 0;
        });
      });
    });
}

async function submitAllScores() {
  const btn = document.getElementById('submit-all-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';

  const inputs = document.querySelectorAll('.score-input');
  const scores = [];
  let hasEmpty = false;

  inputs.forEach(inp => {
    if (inp.value === '' || inp.value === null) { hasEmpty = true; return; }
    scores.push({
      participant_id: inp.dataset.participant,
      criteria_id: inp.dataset.criteria,
      marks: inp.value
    });
  });

  if (scores.length === 0) {
    showToast('Please enter at least one score', 'warning');
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Save All Scores';
    return;
  }

  try {
    const res = await fetch('../cgi-bin/submit_scores.py', {
      method: 'POST',
      body: new URLSearchParams({
        judge_user_id: user.user_id,
        event_id: eventId,
        scores: JSON.stringify(scores)
      })
    });
    const data = await res.json();
    if (data.status === 'success') {
      showToast('Scores saved successfully!', 'success');
      setTimeout(() => window.location.href = 'my_events.html', 1500);
    } else {
      showToast(data.message || 'Failed to save', 'danger');
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Save All Scores';
    }
  } catch(e) {
    showToast('Connection error', 'danger');
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Save All Scores';
  }
}
</script>
</body>
</html>
