<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Scores — Judge</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/judge.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>
<nav class="navbar navbar-expand-lg judge-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="bi bi-stars me-2"></i>EventStar</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list text-white fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="my_events.html">My Events</a></li>
        <li class="nav-item"><a class="nav-link active" href="view_scores.html">View Scores</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small" id="nav-user-name"></span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
      </div>
    </div>
  </div>
</nav>
<div class="student-hero" style="background:linear-gradient(135deg,#1a003a,var(--primary))">
  <div class="container py-3">
    <h4 class="fw-700 text-white mt-2 mb-0"><i class="bi bi-eye me-2"></i>My Given Scores</h4>
  </div>
</div>
<div class="container py-4">
  <div class="card p-3 mb-4">
    <label class="form-label small fw-600">Select Event</label>
    <select id="event-select" class="form-select" style="max-width:400px" onchange="loadScores(this.value)">
      <option value="">— Choose an event —</option>
    </select>
  </div>
  <div id="scores-section">
    <div class="empty-state"><i class="bi bi-clipboard-data"></i><h5>Select an event to view scores</h5></div>
  </div>
</div>
<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('judge');
if (user) {
  document.getElementById('nav-user-name').textContent = user.full_name;
  fetch('../cgi-bin/get_judge_events.py?judge_user_id=' + user.user_id).then(r => r.json()).then(data => {
    if (data.status === 'success') {
      const sel = document.getElementById('event-select');
      data.data.forEach(ev => sel.innerHTML += '<option value="' + ev.event_id + '">' + ev.title + '</option>');
    }
    const urlEvent = new URLSearchParams(window.location.search).get('event_id');
    if (urlEvent) { document.getElementById('event-select').value = urlEvent; loadScores(urlEvent); }
  });
}

async function loadScores(eventId) {
  if (!eventId) return;
  document.getElementById('scores-section').innerHTML = '<div class="text-center py-4"><div class="spinner-border text-accent"></div></div>';
  try {
    const res = await fetch('../cgi-bin/get_given_scores.py?judge_user_id=' + user.user_id + '&event_id=' + eventId);
    const data = await res.json();
    if (data.status !== 'success' || data.data.length === 0) {
      document.getElementById('scores-section').innerHTML = '<div class="empty-state"><i class="bi bi-clipboard-x"></i><p>No scores given yet for this event</p></div>';
      return;
    }

    // Group by participant
    const byParticipant = {};
    const criteriaSet = new Set();
    data.data.forEach(row => {
      if (!byParticipant[row.participant_id]) {
        byParticipant[row.participant_id] = { name: row.full_name, performance: row.performance_title, scores: {} };
      }
      byParticipant[row.participant_id].scores[row.criteria_name] = { marks: row.marks, max: row.max_marks };
      criteriaSet.add(row.criteria_name);
    });

    const criteriaList = [...criteriaSet];
    const headerCols = criteriaList.map(c => '<th class="text-center">' + c + '</th>').join('');

    const rows = Object.values(byParticipant).map(p => {
      let total = 0, totalMax = 0;
      const cols = criteriaList.map(c => {
        const s = p.scores[c];
        if (s && s.marks !== null) { total += s.marks; totalMax += s.max; }
        return '<td class="text-center">' + (s && s.marks !== null ? s.marks.toFixed(1) + '/' + s.max : '<span class="text-muted">—</span>') + '</td>';
      }).join('');
      return '<tr><td><div class="fw-600">' + p.name + '</div><small class="text-muted">' + (p.performance || '') + '</small></td>' + cols + '<td class="text-center fw-700 text-accent">' + total.toFixed(1) + '/' + totalMax + '</td></tr>';
    }).join('');

    document.getElementById('scores-section').innerHTML = `
      <div class="card">
        <div class="table-responsive">
          <table class="table table-hover mb-0 judge-score-table">
            <thead><tr><th>Participant</th>${headerCols}<th class="text-center">Total</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('scores-section').innerHTML = '<div class="text-center text-danger">Failed to load</div>';
  }
}
</script>
</body>
</html>
