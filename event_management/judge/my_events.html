<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Events — Judge</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/judge.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>
<nav class="navbar navbar-expand-lg judge-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="bi bi-stars me-2"></i>EventStar</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list text-white fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="my_events.html">My Events</a></li>
        <li class="nav-item"><a class="nav-link" href="view_scores.html">View Scores</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small" id="nav-user-name"></span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
      </div>
    </div>
  </div>
</nav>
<div class="student-hero" style="background:linear-gradient(135deg,#1a003a,var(--primary))">
  <div class="container py-3">
    <h4 class="fw-700 text-white mt-2 mb-0"><i class="bi bi-calendar-check me-2"></i>My Assigned Events</h4>
  </div>
</div>
<div class="container py-4">
  <div id="events-container">
    <div class="text-center py-5"><div class="spinner-border text-accent"></div></div>
  </div>
</div>
<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('judge');
if (user) {
  document.getElementById('nav-user-name').textContent = user.full_name;
  fetch('../cgi-bin/get_judge_events.py?judge_user_id=' + user.user_id).then(r => r.json()).then(data => {
    const container = document.getElementById('events-container');
    if (data.status === 'success' && data.data.length > 0) {
      container.innerHTML = '<div class="row g-3">' + data.data.map(ev => {
        const allScored = ev.scored_count >= ev.participant_count && ev.participant_count > 0;
        const pct = ev.participant_count > 0 ? Math.round(ev.scored_count / ev.participant_count * 100) : 0;
        return `<div class="col-md-6">
          <div class="card p-4 ${allScored ? 'card-accent-success' : ev.scores_locked ? 'card-accent-danger' : 'card-accent-left'}">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div>
                <h5 class="fw-700 mb-1">${ev.title}</h5>
                <p class="text-muted small mb-0">${ev.category_name || ''} &bull; ${formatDate(ev.event_date)}</p>
              </div>
              <div class="d-flex flex-column align-items-end gap-1">
                ${getStatusBadge(ev.status)}
                ${ev.scores_locked ? '<span class="badge bg-danger"><i class="bi bi-lock me-1"></i>Locked</span>' : ''}
              </div>
            </div>
            <div class="mb-3">
              <div class="d-flex justify-content-between small mb-1">
                <span>Scoring Progress</span>
                <span>${ev.scored_count}/${ev.participant_count} (${pct}%)</span>
              </div>
              <div class="score-bar-container"><div class="score-bar" style="width:${pct}%"></div></div>
            </div>
            <div class="d-flex gap-2">
              <a href="score_participants.html?event_id=${ev.event_id}" class="btn btn-sm btn-primary-custom flex-fill">
                <i class="bi bi-pencil me-1"></i>${ev.scores_locked ? 'View Scores' : 'Score Participants'}
              </a>
              <a href="view_scores.html?event_id=${ev.event_id}" class="btn btn-sm btn-outline-primary flex-fill">
                <i class="bi bi-eye me-1"></i>View Summary
              </a>
            </div>
          </div>
        </div>`;
      }).join('') + '</div>';
    } else {
      container.innerHTML = '<div class="empty-state"><i class="bi bi-calendar-x"></i><h5>No events assigned</h5><p class="text-muted">Contact admin to get assigned to events</p></div>';
    }
  });
}
</script>
</body>
</html>
