<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports — Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/admin.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<aside class="admin-sidebar" id="admin-sidebar">
  <div class="sidebar-brand"><div class="d-flex align-items-center gap-2"><i class="bi bi-stars text-warning fs-4"></i><div><span>EventStar</span><br><small>Admin Panel</small></div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">Overview</div><a href="dashboard.html"><i class="bi bi-grid"></i>Dashboard</a>
    <div class="nav-section-title">Events</div>
    <a href="manage_events.html"><i class="bi bi-calendar-event"></i>Manage Events</a>
    <a href="manage_categories.html"><i class="bi bi-tags"></i>Categories</a>
    <a href="manage_criteria.html"><i class="bi bi-clipboard-check"></i>Criteria</a>
    <div class="nav-section-title">People</div>
    <a href="manage_participants.html"><i class="bi bi-people"></i>Participants</a>
    <a href="manage_judges.html"><i class="bi bi-person-badge"></i>Judges</a>
    <a href="assign_judges.html"><i class="bi bi-person-plus"></i>Assign Judges</a>
    <div class="nav-section-title">Controls</div>
    <a href="voting_control.html"><i class="bi bi-toggle-on"></i>Voting Control</a>
    <a href="score_lock.html"><i class="bi bi-lock"></i>Score Lock</a>
    <a href="announce_results.html"><i class="bi bi-trophy"></i>Announce Results</a>
    <a href="reports.html" class="active"><i class="bi bi-bar-chart"></i>Reports</a>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-info"><div class="admin-avatar" id="admin-avatar">A</div><div><div class="admin-name" id="admin-name">Admin</div><div class="admin-role">Administrator</div></div></div>
    <button onclick="logout()" class="btn btn-outline-light btn-sm w-100"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
  </div>
</aside>
<div class="admin-main">
  <div class="admin-topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle"><i class="bi bi-list"></i></button>
      <div class="page-title">Reports & Analytics</div>
    </div>
    <button class="btn btn-outline-primary btn-sm" onclick="window.print()">
      <i class="bi bi-printer me-2"></i>Print / Export PDF
    </button>
  </div>
  <div class="admin-content">
    <div class="card p-3 mb-4">
      <div class="row g-3 align-items-center">
        <div class="col-md-5">
          <label class="form-label small fw-600">Select Event</label>
          <select id="event-select" class="form-select" onchange="loadReport(this.value)">
            <option value="">— All Events Overview —</option>
          </select>
        </div>
      </div>
    </div>

    <div id="report-stats" class="row g-3 mb-4">
      <div class="col-12"><div class="text-center py-4"><div class="spinner-border text-accent"></div></div></div>
    </div>

    <div class="row g-4" id="charts-section" style="display:none">
      <div class="col-lg-6">
        <div class="card p-4">
          <h6 class="fw-700 mb-3"><i class="bi bi-graph-up me-2 text-accent"></i>Registrations Over Time</h6>
          <div class="chart-container"><canvas id="regChart"></canvas></div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card p-4">
          <h6 class="fw-700 mb-3"><i class="bi bi-bar-chart me-2 text-accent"></i>Votes Per Participant</h6>
          <div class="chart-container"><canvas id="votesChart"></canvas></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/charts.js"></script>
<script>
const user = checkAuth('admin');
let regChart, votesChart;

if (user) {
  document.getElementById('admin-name').textContent = user.full_name;
  document.getElementById('admin-avatar').textContent = user.full_name.charAt(0);
  fetch('../cgi-bin/get_report_data.py').then(r => r.json()).then(data => {
    if (data.status === 'success') {
      const sel = document.getElementById('event-select');
      data.data.forEach(ev => sel.innerHTML += '<option value="' + ev.event_id + '">' + ev.title + '</option>');
    }
    loadReport('');
  });
}

async function loadReport(eventId) {
  const statsDiv = document.getElementById('report-stats');
  const chartsDiv = document.getElementById('charts-section');
  statsDiv.innerHTML = '<div class="col-12 text-center py-4"><div class="spinner-border text-accent"></div></div>';
  chartsDiv.style.display = 'none';

  const url = eventId ? '../cgi-bin/get_report_data.py?event_id=' + eventId : '../cgi-bin/admin_get_stats.py';
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.status !== 'success') { statsDiv.innerHTML = '<div class="col-12 text-center text-danger">Failed to load</div>'; return; }

    if (eventId) {
      statsDiv.innerHTML = `
        <div class="col-md-6 col-xl-4 fade-in-1"><div class="admin-stat-card purple"><div class="d-flex align-items-center gap-3"><div class="p-3 rounded-3" style="background:rgba(123,47,190,0.1)"><i class="bi bi-send text-accent fs-4"></i></div><div><h2>${data.total_registered}</h2><p>Total Registered</p></div></div></div></div>
        <div class="col-md-6 col-xl-4 fade-in-2"><div class="admin-stat-card green"><div class="d-flex align-items-center gap-3"><div class="p-3 rounded-3" style="background:rgba(40,167,69,0.1)"><i class="bi bi-check-circle text-success fs-4"></i></div><div><h2>${data.approved}</h2><p>Approved</p></div></div></div></div>
        <div class="col-md-6 col-xl-4 fade-in-3"><div class="admin-stat-card red"><div class="d-flex align-items-center gap-3"><div class="p-3 rounded-3" style="background:rgba(220,53,69,0.1)"><i class="bi bi-x-circle text-danger fs-4"></i></div><div><h2>${data.rejected}</h2><p>Rejected</p></div></div></div></div>
        <div class="col-md-6 col-xl-4 fade-in-1"><div class="admin-stat-card gold"><div class="d-flex align-items-center gap-3"><div class="p-3 rounded-3" style="background:rgba(255,180,0,0.1)"><i class="bi bi-hand-thumbs-up fs-4" style="color:var(--gold)"></i></div><div><h2>${data.total_votes}</h2><p>Total Votes</p></div></div></div></div>
        <div class="col-md-6 col-xl-4 fade-in-2"><div class="admin-stat-card purple"><div class="d-flex align-items-center gap-3"><div class="p-3 rounded-3" style="background:rgba(123,47,190,0.1)"><i class="bi bi-star text-accent fs-4"></i></div><div><h2>${data.avg_score}</h2><p>Avg Final Score</p></div></div></div></div>`;

      chartsDiv.style.display = 'flex';
      if (regChart) regChart.destroy();
      if (votesChart) votesChart.destroy();

      const regLabels = data.reg_over_time.map(r => r.reg_date);
      const regData = data.reg_over_time.map(r => r.cnt);
      regChart = new Chart(document.getElementById('regChart'), { type: 'line', data: { labels: regLabels, datasets: [{ label: 'Registrations', data: regData, borderColor: '#7B2FBE', backgroundColor: 'rgba(123,47,190,0.1)', borderWidth: 2, tension: 0.4, fill: true }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });

      const vLabels = data.votes_per_participant.map(v => v.full_name);
      const vData = data.votes_per_participant.map(v => v.vote_count);
      votesChart = new Chart(document.getElementById('votesChart'), { type: 'bar', data: { labels: vLabels, datasets: [{ label: 'Votes', data: vData, backgroundColor: ['rgba(255,180,0,0.8)','rgba(192,192,192,0.8)','rgba(205,127,50,0.8)','rgba(123,47,190,0.8)'], borderRadius: 6, borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
    } else {
      statsDiv.innerHTML = `
        <div class="col-md-6 col-xl-3 fade-in-1"><div class="admin-stat-card purple"><div class="d-flex align-items-center gap-3"><div class="p-3 rounded-3" style="background:rgba(123,47,190,0.1)"><i class="bi bi-calendar-event text-accent fs-4"></i></div><div><h2>${data.total_events}</h2><p>Total Events</p></div></div></div></div>
        <div class="col-md-6 col-xl-3 fade-in-2"><div class="admin-stat-card gold"><div class="d-flex align-items-center gap-3"><div class="p-3 rounded-3" style="background:rgba(255,180,0,0.1)"><i class="bi bi-people fs-4" style="color:var(--gold)"></i></div><div><h2>${data.total_participants}</h2><p>Participants</p></div></div></div></div>
        <div class="col-md-6 col-xl-3 fade-in-3"><div class="admin-stat-card green"><div class="d-flex align-items-center gap-3"><div class="p-3 rounded-3" style="background:rgba(40,167,69,0.1)"><i class="bi bi-person-badge text-success fs-4"></i></div><div><h2>${data.active_judges}</h2><p>Judges</p></div></div></div></div>
        <div class="col-md-6 col-xl-3 fade-in-4"><div class="admin-stat-card red"><div class="d-flex align-items-center gap-3"><div class="p-3 rounded-3" style="background:rgba(220,53,69,0.1)"><i class="bi bi-hand-thumbs-up text-danger fs-4"></i></div><div><h2>${data.total_votes}</h2><p>Total Votes</p></div></div></div></div>`;
    }
  } catch(e) { statsDiv.innerHTML = '<div class="col-12 text-center text-danger">Failed to load report</div>'; }
}
</script>
</body>
</html>
