<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assign Judges — Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/admin.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<aside class="admin-sidebar" id="admin-sidebar">
  <div class="sidebar-brand"><div class="d-flex align-items-center gap-2"><i class="bi bi-stars text-warning fs-4"></i><div><span>EventStar</span><br><small>Admin Panel</small></div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">Overview</div><a href="dashboard.html"><i class="bi bi-grid"></i>Dashboard</a>
    <div class="nav-section-title">Events</div>
    <a href="manage_events.html"><i class="bi bi-calendar-event"></i>Manage Events</a>
    <a href="manage_categories.html"><i class="bi bi-tags"></i>Categories</a>
    <a href="manage_criteria.html"><i class="bi bi-clipboard-check"></i>Criteria</a>
    <div class="nav-section-title">People</div>
    <a href="manage_participants.html"><i class="bi bi-people"></i>Participants</a>
    <a href="manage_judges.html"><i class="bi bi-person-badge"></i>Judges</a>
    <a href="assign_judges.html" class="active"><i class="bi bi-person-plus"></i>Assign Judges</a>
    <div class="nav-section-title">Controls</div>
    <a href="voting_control.html"><i class="bi bi-toggle-on"></i>Voting Control</a>
    <a href="score_lock.html"><i class="bi bi-lock"></i>Score Lock</a>
    <a href="announce_results.html"><i class="bi bi-trophy"></i>Announce Results</a>
    <a href="reports.html"><i class="bi bi-bar-chart"></i>Reports</a>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-info"><div class="admin-avatar" id="admin-avatar">A</div><div><div class="admin-name" id="admin-name">Admin</div><div class="admin-role">Administrator</div></div></div>
    <button onclick="logout()" class="btn btn-outline-light btn-sm w-100"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
  </div>
</aside>
<div class="admin-main">
  <div class="admin-topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle"><i class="bi bi-list"></i></button>
      <div class="page-title">Assign Judges to Events</div>
    </div>
  </div>
  <div class="admin-content">
    <div class="row g-4">
      <div class="col-lg-5">
        <div class="card p-3">
          <h6 class="fw-700 mb-3"><i class="bi bi-calendar me-2 text-accent"></i>Select Event</h6>
          <select id="event-select" class="form-select mb-3" onchange="loadEventJudges(this.value)">
            <option value="">— Select event —</option>
          </select>
          <div id="assigned-judges">
            <p class="text-muted text-center small">Select an event to see assigned judges</p>
          </div>
        </div>
      </div>
      <div class="col-lg-7">
        <div class="card p-3">
          <h6 class="fw-700 mb-3"><i class="bi bi-people me-2 text-accent"></i>Available Judges</h6>
          <div id="available-judges">
            <div class="text-center py-3"><div class="spinner-border spinner-border-sm text-accent"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('admin');
let allJudges = [];
let currentEventId = null;

if (user) {
  document.getElementById('admin-name').textContent = user.full_name;
  document.getElementById('admin-avatar').textContent = user.full_name.charAt(0);
  loadData();
}

function loadData() {
  fetch('../cgi-bin/assign_judge.py?action=get').then(r => r.json()).then(data => {
    if (data.status === 'success') {
      allJudges = data.judges;
      const sel = document.getElementById('event-select');
      data.events.forEach(ev => sel.innerHTML += '<option value="' + ev.event_id + '">' + ev.title + '</option>');
      renderAvailableJudges([]);
    }
  });
}

function renderAvailableJudges(assignedIds) {
  const container = document.getElementById('available-judges');
  if (allJudges.length === 0) { container.innerHTML = '<p class="text-muted text-center small">No judges registered yet</p>'; return; }
  container.innerHTML = allJudges.map(j => `
    <div class="d-flex align-items-center justify-content-between p-2 rounded-3 mb-2" style="background:var(--light-bg)">
      <div class="d-flex align-items-center gap-2">
        <div class="rounded-circle d-flex align-items-center justify-content-center fw-700 text-white" style="width:36px;height:36px;background:linear-gradient(135deg,#1a003a,var(--primary))">${j.full_name.charAt(0)}</div>
        <div><div class="fw-600 small">${j.full_name}</div><small class="text-muted">${j.email}</small></div>
      </div>
      <div>
        ${assignedIds.includes(j.user_id)
          ? '<span class="badge bg-success me-2">Assigned</span><button class="btn btn-sm btn-outline-danger" onclick="removeJudge(' + j.user_id + ')"><i class="bi bi-dash"></i> Remove</button>'
          : (currentEventId ? '<button class="btn btn-sm btn-primary-custom" onclick="assignJudge(' + j.user_id + ')"><i class="bi bi-plus"></i> Assign</button>' : '<span class="text-muted small">Select event first</span>')}
      </div>
    </div>`).join('');
}

async function loadEventJudges(eventId) {
  currentEventId = eventId;
  if (!eventId) { document.getElementById('assigned-judges').innerHTML = '<p class="text-muted text-center small">Select an event</p>'; renderAvailableJudges([]); return; }
  const res = await fetch('../cgi-bin/assign_judge.py?action=get_event_judges&event_id=' + eventId);
  const data = await res.json();
  const assigned = data.status === 'success' ? data.data : [];
  const assignedIds = assigned.map(j => j.user_id);
  document.getElementById('assigned-judges').innerHTML = assigned.length > 0
    ? '<div class="mb-2 small text-muted fw-600">Currently Assigned (' + assigned.length + ')</div>' + assigned.map(j => `<div class="d-flex align-items-center gap-2 p-2 rounded-3 mb-1" style="background:rgba(40,167,69,0.1)"><i class="bi bi-check-circle text-success"></i><span class="small fw-600">${j.full_name}</span></div>`).join('')
    : '<p class="text-muted small text-center">No judges assigned yet</p>';
  renderAvailableJudges(assignedIds);
}

async function assignJudge(judgeId) {
  const res = await fetch('../cgi-bin/assign_judge.py', { method: 'POST', body: new URLSearchParams({ action: 'assign', judge_user_id: judgeId, event_id: currentEventId }) });
  const data = await res.json();
  if (data.status === 'success') { showToast('Judge assigned!', 'success'); loadEventJudges(currentEventId); }
  else showToast(data.message, 'danger');
}

async function removeJudge(judgeId) {
  const res = await fetch('../cgi-bin/assign_judge.py', { method: 'POST', body: new URLSearchParams({ action: 'remove', judge_user_id: judgeId, event_id: currentEventId }) });
  const data = await res.json();
  if (data.status === 'success') { showToast('Judge removed', 'success'); loadEventJudges(currentEventId); }
  else showToast(data.message, 'danger');
}
</script>
</body>
</html>
