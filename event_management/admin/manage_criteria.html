<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Criteria — Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/admin.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<aside class="admin-sidebar" id="admin-sidebar">
  <div class="sidebar-brand"><div class="d-flex align-items-center gap-2"><i class="bi bi-stars text-warning fs-4"></i><div><span>EventStar</span><br><small>Admin Panel</small></div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">Overview</div><a href="dashboard.html"><i class="bi bi-grid"></i>Dashboard</a>
    <div class="nav-section-title">Events</div>
    <a href="manage_events.html"><i class="bi bi-calendar-event"></i>Manage Events</a>
    <a href="manage_categories.html"><i class="bi bi-tags"></i>Categories</a>
    <a href="manage_criteria.html" class="active"><i class="bi bi-clipboard-check"></i>Criteria</a>
    <div class="nav-section-title">People</div>
    <a href="manage_participants.html"><i class="bi bi-people"></i>Participants</a>
    <a href="manage_judges.html"><i class="bi bi-person-badge"></i>Judges</a>
    <a href="assign_judges.html"><i class="bi bi-person-plus"></i>Assign Judges</a>
    <div class="nav-section-title">Controls</div>
    <a href="voting_control.html"><i class="bi bi-toggle-on"></i>Voting Control</a>
    <a href="score_lock.html"><i class="bi bi-lock"></i>Score Lock</a>
    <a href="announce_results.html"><i class="bi bi-trophy"></i>Announce Results</a>
    <a href="reports.html"><i class="bi bi-bar-chart"></i>Reports</a>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-info"><div class="admin-avatar" id="admin-avatar">A</div><div><div class="admin-name" id="admin-name">Admin</div><div class="admin-role">Administrator</div></div></div>
    <button onclick="logout()" class="btn btn-outline-light btn-sm w-100"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
  </div>
</aside>
<div class="admin-main">
  <div class="admin-topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle"><i class="bi bi-list"></i></button>
      <div class="page-title">Manage Criteria</div>
    </div>
  </div>
  <div class="admin-content">
    <div class="card p-3 mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-5">
          <label class="form-label fw-600 small">Select Event</label>
          <select id="event-select" class="form-select" onchange="loadCriteria(this.value)">
            <option value="">— Select an event —</option>
          </select>
        </div>
      </div>
    </div>
    <div class="row g-4" id="criteria-section">
      <div class="col-12"><div class="empty-state"><i class="bi bi-clipboard-check"></i><h5>Select an event to manage criteria</h5></div></div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('admin');
if (user) {
  document.getElementById('admin-name').textContent = user.full_name;
  document.getElementById('admin-avatar').textContent = user.full_name.charAt(0);
  fetch('../cgi-bin/get_events.py').then(r => r.json()).then(data => {
    if (data.status === 'success') {
      const sel = document.getElementById('event-select');
      data.data.forEach(ev => sel.innerHTML += '<option value="' + ev.event_id + '">' + ev.title + '</option>');
    }
  });
}

function loadCriteria(eventId) {
  if (!eventId) return;
  document.getElementById('criteria-section').innerHTML = '<div class="col-12 text-center py-4"><div class="spinner-border text-accent"></div></div>';
  fetch('../cgi-bin/manage_criteria.py?action=get&event_id=' + eventId).then(r => r.json()).then(data => {
    const section = document.getElementById('criteria-section');
    const rows = data.data || [];
    section.innerHTML = `
      <div class="col-lg-7">
        <div class="card p-4">
          <h6 class="fw-700 mb-3"><i class="bi bi-list me-2 text-accent"></i>Existing Criteria (${rows.length})</h6>
          <div id="criteria-list">
            ${rows.length > 0 ? rows.map(c => `
              <div class="d-flex align-items-center justify-content-between p-3 mb-2 rounded-3" style="background:var(--light-bg)">
                <div>
                  <div class="fw-600">${c.criteria_name}</div>
                  <small class="text-muted">${c.description || ''}</small>
                </div>
                <div class="d-flex align-items-center gap-2">
                  <span class="badge bg-accent text-white">${c.max_marks} pts</span>
                  <button class="btn btn-sm btn-outline-danger" onclick="deleteCriteria(${c.criteria_id})"><i class="bi bi-trash"></i></button>
                </div>
              </div>`).join('') : '<p class="text-muted text-center py-3">No criteria added yet</p>'}
          </div>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card p-4">
          <h6 class="fw-700 mb-3"><i class="bi bi-plus me-2 text-accent"></i>Add Criteria</h6>
          <div class="mb-3"><label class="form-label small fw-600">Criteria Name *</label><input type="text" id="c-name" class="form-control" placeholder="e.g. Performance Quality"></div>
          <div class="mb-3"><label class="form-label small fw-600">Max Marks *</label><input type="number" id="c-max" class="form-control" value="10" min="1" max="100"></div>
          <div class="mb-3"><label class="form-label small fw-600">Description</label><input type="text" id="c-desc" class="form-control" placeholder="Brief description..."></div>
          <button class="btn btn-primary-custom w-100" onclick="addCriteria('${eventId}')"><i class="bi bi-plus me-2"></i>Add Criteria</button>
          <div class="alert alert-info small mt-3 py-2">
            <i class="bi bi-info-circle me-1"></i>Note: Criteria cannot be changed after scoring begins.
          </div>
        </div>
      </div>`;
  });
}

async function addCriteria(eventId) {
  const name = document.getElementById('c-name').value.trim();
  const max = document.getElementById('c-max').value;
  const desc = document.getElementById('c-desc').value.trim();
  if (!name) { showToast('Criteria name required', 'warning'); return; }
  const res = await fetch('../cgi-bin/manage_criteria.py', { method: 'POST', body: new URLSearchParams({ action: 'add', event_id: eventId, criteria_name: name, max_marks: max, description: desc }) });
  const data = await res.json();
  if (data.status === 'success') { showToast('Criteria added!', 'success'); loadCriteria(eventId); }
  else showToast(data.message, 'danger');
}

async function deleteCriteria(id) {
  if (!confirm('Delete this criteria? This cannot be undone if scores exist.')) return;
  const eventId = document.getElementById('event-select').value;
  const res = await fetch('../cgi-bin/manage_criteria.py', { method: 'POST', body: new URLSearchParams({ action: 'delete', criteria_id: id }) });
  const data = await res.json();
  if (data.status === 'success') { showToast('Deleted', 'success'); loadCriteria(eventId); }
  else showToast(data.message, 'danger');
}
</script>
</body>
</html>
