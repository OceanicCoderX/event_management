<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Participants — Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/admin.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<aside class="admin-sidebar" id="admin-sidebar">
  <div class="sidebar-brand"><div class="d-flex align-items-center gap-2"><i class="bi bi-stars text-warning fs-4"></i><div><span>EventStar</span><br><small>Admin Panel</small></div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">Overview</div><a href="dashboard.html"><i class="bi bi-grid"></i>Dashboard</a>
    <div class="nav-section-title">Events</div>
    <a href="manage_events.html"><i class="bi bi-calendar-event"></i>Manage Events</a>
    <a href="manage_categories.html"><i class="bi bi-tags"></i>Categories</a>
    <a href="manage_criteria.html"><i class="bi bi-clipboard-check"></i>Criteria</a>
    <div class="nav-section-title">People</div>
    <a href="manage_participants.html" class="active"><i class="bi bi-people"></i>Participants</a>
    <a href="manage_judges.html"><i class="bi bi-person-badge"></i>Judges</a>
    <a href="assign_judges.html"><i class="bi bi-person-plus"></i>Assign Judges</a>
    <div class="nav-section-title">Controls</div>
    <a href="voting_control.html"><i class="bi bi-toggle-on"></i>Voting Control</a>
    <a href="score_lock.html"><i class="bi bi-lock"></i>Score Lock</a>
    <a href="announce_results.html"><i class="bi bi-trophy"></i>Announce Results</a>
    <a href="reports.html"><i class="bi bi-bar-chart"></i>Reports</a>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-info"><div class="admin-avatar" id="admin-avatar">A</div><div><div class="admin-name" id="admin-name">Admin</div><div class="admin-role">Administrator</div></div></div>
    <button onclick="logout()" class="btn btn-outline-light btn-sm w-100"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
  </div>
</aside>
<div class="admin-main">
  <div class="admin-topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle"><i class="bi bi-list"></i></button>
      <div class="page-title">Manage Participants</div>
    </div>
  </div>
  <div class="admin-content">
    <div class="card p-3 mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label small fw-600">Event</label>
          <select id="event-filter" class="form-select" onchange="loadParticipants()">
            <option value="">All Events</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-600">Status</label>
          <select id="status-filter" class="form-select" onchange="loadParticipants()">
            <option value="All">All Status</option>
            <option value="Pending">Pending</option>
            <option value="Approved">Approved</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control" placeholder="Search..." oninput="filterTable()" id="search-input">
        </div>
        <div class="col-md-2">
          <button class="btn btn-success w-100" onclick="bulkApprove()" title="Approve all pending for selected event">
            <i class="bi bi-check-all me-1"></i>Bulk Approve
          </button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead style="background:var(--primary);color:white">
            <tr><th>Participant</th><th>Event</th><th>Performance</th><th>Registered</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="participants-tbody">
            <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm text-accent"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('admin');
if (user) {
  document.getElementById('admin-name').textContent = user.full_name;
  document.getElementById('admin-avatar').textContent = user.full_name.charAt(0);
  fetch('../cgi-bin/get_events.py').then(r => r.json()).then(data => {
    if (data.status === 'success') {
      const sel = document.getElementById('event-filter');
      data.data.forEach(ev => sel.innerHTML += '<option value="' + ev.event_id + '">' + ev.title + '</option>');
    }
  });
  loadParticipants();
}

function loadParticipants() {
  const eventId = document.getElementById('event-filter').value;
  const status = document.getElementById('status-filter').value;
  let url = '../cgi-bin/get_participants_by_event.py?event_id=' + eventId + '&status=' + status;
  if (!eventId) url = '../cgi-bin/get_participants_by_event.py?status=' + status;

  fetch(url).then(r => r.json()).then(data => {
    const tbody = document.getElementById('participants-tbody');
    if (data.status === 'success' && data.data.length > 0) {
      tbody.innerHTML = data.data.map(p => `
        <tr>
          <td>
            <div class="d-flex align-items-center gap-2">
              <div class="rounded-circle d-flex align-items-center justify-content-center fw-700 text-white" style="width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--accent));flex-shrink:0">${p.full_name.charAt(0)}</div>
              <div><div class="fw-600 small">${p.full_name}</div><small class="text-muted">${p.email || ''}</small></div>
            </div>
          </td>
          <td><small id="ev-${p.participant_id}">—</small></td>
          <td><small>${p.performance_title || '—'}</small></td>
          <td><small>${formatDate(p.registered_at)}</small></td>
          <td>${getStatusBadge(p.status)}</td>
          <td>
            <div class="d-flex gap-1">
              ${p.status !== 'Approved' ? `<button class="btn btn-sm btn-success" onclick="updateStatus(${p.participant_id},'Approved')"><i class="bi bi-check"></i></button>` : ''}
              ${p.status !== 'Rejected' ? `<button class="btn btn-sm btn-danger" onclick="updateStatus(${p.participant_id},'Rejected')"><i class="bi bi-x"></i></button>` : ''}
              ${p.status !== 'Pending' ? `<button class="btn btn-sm btn-outline-warning" onclick="updateStatus(${p.participant_id},'Pending')"><i class="bi bi-arrow-counterclockwise"></i></button>` : ''}
            </div>
          </td>
        </tr>`).join('');
      // Load event names
      data.data.forEach(p => {
        fetch('../cgi-bin/get_event_detail.py?event_id=' + p.event_id).then(r => r.json()).then(d => {
          if (d.status === 'success') {
            const el = document.getElementById('ev-' + p.participant_id);
            if (el) el.textContent = d.event.title;
          }
        }).catch(() => {});
      });
    } else {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="bi bi-people"></i><p>No participants found</p></div></td></tr>';
    }
  });
}

async function updateStatus(participantId, status) {
  const res = await fetch('../cgi-bin/update_participant_status.py', { method: 'POST', body: new URLSearchParams({ participant_id: participantId, status }) });
  const data = await res.json();
  if (data.status === 'success') { showToast('Status updated to ' + status, 'success'); loadParticipants(); }
  else showToast(data.message, 'danger');
}

async function bulkApprove() {
  const eventId = document.getElementById('event-filter').value;
  if (!eventId) { showToast('Please select an event for bulk approve', 'warning'); return; }
  if (!confirm('Approve all pending participants for this event?')) return;
  const res = await fetch('../cgi-bin/update_participant_status.py', { method: 'POST', body: new URLSearchParams({ bulk: '1', event_id: eventId }) });
  const data = await res.json();
  if (data.status === 'success') { showToast(data.message, 'success'); loadParticipants(); }
  else showToast(data.message, 'danger');
}

function filterTable() {
  const term = document.getElementById('search-input').value.toLowerCase();
  document.querySelectorAll('#participants-tbody tr').forEach(r => r.style.display = r.textContent.toLowerCase().includes(term) ? '' : 'none');
}
</script>
</body>
</html>
