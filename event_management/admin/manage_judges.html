<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Judges — Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/admin.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<aside class="admin-sidebar" id="admin-sidebar">
  <div class="sidebar-brand"><div class="d-flex align-items-center gap-2"><i class="bi bi-stars text-warning fs-4"></i><div><span>EventStar</span><br><small>Admin Panel</small></div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">Overview</div><a href="dashboard.html"><i class="bi bi-grid"></i>Dashboard</a>
    <div class="nav-section-title">Events</div>
    <a href="manage_events.html"><i class="bi bi-calendar-event"></i>Manage Events</a>
    <a href="manage_categories.html"><i class="bi bi-tags"></i>Categories</a>
    <a href="manage_criteria.html"><i class="bi bi-clipboard-check"></i>Criteria</a>
    <div class="nav-section-title">People</div>
    <a href="manage_participants.html"><i class="bi bi-people"></i>Participants</a>
    <a href="manage_judges.html" class="active"><i class="bi bi-person-badge"></i>Judges</a>
    <a href="assign_judges.html"><i class="bi bi-person-plus"></i>Assign Judges</a>
    <div class="nav-section-title">Controls</div>
    <a href="voting_control.html"><i class="bi bi-toggle-on"></i>Voting Control</a>
    <a href="score_lock.html"><i class="bi bi-lock"></i>Score Lock</a>
    <a href="announce_results.html"><i class="bi bi-trophy"></i>Announce Results</a>
    <a href="reports.html"><i class="bi bi-bar-chart"></i>Reports</a>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-info"><div class="admin-avatar" id="admin-avatar">A</div><div><div class="admin-name" id="admin-name">Admin</div><div class="admin-role">Administrator</div></div></div>
    <button onclick="logout()" class="btn btn-outline-light btn-sm w-100"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
  </div>
</aside>
<div class="admin-main">
  <div class="admin-topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle"><i class="bi bi-list"></i></button>
      <div class="page-title">Manage Judges</div>
    </div>
    <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#judgeModal">
      <i class="bi bi-plus me-2"></i>Add Judge
    </button>
  </div>
  <div class="admin-content">
    <div class="card mb-3 p-3"><input type="text" class="form-control" placeholder="Search judges..." oninput="filterTable()"></div>
    <div class="card">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead style="background:var(--primary);color:white">
            <tr><th>Judge</th><th>Email</th><th>Phone</th><th>Assigned Events</th><th>Joined</th><th>Actions</th></tr>
          </thead>
          <tbody id="judges-tbody">
            <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm text-accent"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="judgeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--primary);color:white">
        <h5 class="modal-title">Add Judge</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3"><label class="form-label fw-600 small">Full Name *</label><input type="text" id="j-name" class="form-control" required></div>
        <div class="mb-3"><label class="form-label fw-600 small">Email *</label><input type="email" id="j-email" class="form-control" required></div>
        <div class="mb-3"><label class="form-label fw-600 small">Phone</label><input type="tel" id="j-phone" class="form-control"></div>
        <div class="mb-3"><label class="form-label fw-600 small">Password *</label><input type="password" id="j-pwd" class="form-control" required></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary-custom" onclick="addJudge()">Add Judge</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('admin');
if (user) { document.getElementById('admin-name').textContent = user.full_name; document.getElementById('admin-avatar').textContent = user.full_name.charAt(0); loadJudges(); }

function loadJudges() {
  fetch('../cgi-bin/add_edit_judge.py?action=get').then(r => r.json()).then(data => {
    const tbody = document.getElementById('judges-tbody');
    if (data.status === 'success' && data.data.length > 0) {
      tbody.innerHTML = data.data.map(j => `
        <tr>
          <td><div class="d-flex align-items-center gap-2">
            <div class="rounded-circle d-flex align-items-center justify-content-center fw-700 text-white" style="width:36px;height:36px;background:linear-gradient(135deg,#1a003a,var(--primary))">${j.full_name.charAt(0)}</div>
            <div class="fw-600">${j.full_name}</div>
          </div></td>
          <td><small>${j.email}</small></td>
          <td><small>${j.phone || '—'}</small></td>
          <td><span class="badge bg-accent text-white">${j.assigned_events}</span></td>
          <td><small>${formatDate(j.created_at)}</small></td>
          <td>
            <div class="d-flex gap-1">
              <a href="assign_judges.html" class="btn btn-sm btn-outline-primary" title="Assign Events"><i class="bi bi-calendar-plus"></i></a>
              <button class="btn btn-sm btn-outline-danger" onclick="deleteJudge(${j.user_id},'${j.full_name.replace(/'/g,"\\'")}')" title="Remove"><i class="bi bi-trash"></i></button>
            </div>
          </td>
        </tr>`).join('');
    } else {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="bi bi-person-badge"></i><p>No judges yet</p></div></td></tr>';
    }
  });
}

async function addJudge() {
  const name = document.getElementById('j-name').value.trim();
  const email = document.getElementById('j-email').value.trim();
  const pwd = document.getElementById('j-pwd').value;
  if (!name || !email || !pwd) { showToast('All required fields must be filled', 'warning'); return; }
  const res = await fetch('../cgi-bin/add_edit_judge.py', { method: 'POST', body: new URLSearchParams({ action: 'add', full_name: name, email, phone: document.getElementById('j-phone').value, password: pwd }) });
  const data = await res.json();
  if (data.status === 'success') { showToast('Judge added!', 'success'); bootstrap.Modal.getInstance(document.getElementById('judgeModal')).hide(); loadJudges(); }
  else showToast(data.message, 'danger');
}

function deleteJudge(id, name) {
  if (!confirm('Remove judge: ' + name + '?')) return;
  fetch('../cgi-bin/add_edit_judge.py', { method: 'POST', body: new URLSearchParams({ action: 'delete', judge_id: id }) })
    .then(r => r.json()).then(data => { if (data.status === 'success') { showToast('Judge removed', 'success'); loadJudges(); } else showToast(data.message, 'danger'); });
}

function filterTable() {
  const term = event.target.value.toLowerCase();
  document.querySelectorAll('#judges-tbody tr').forEach(r => r.style.display = r.textContent.toLowerCase().includes(term) ? '' : 'none');
}
</script>
</body>
</html>
