<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Events — EventStar</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/student.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg student-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="bi bi-stars me-2"></i>EventStar</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list text-white fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-grid me-1"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="browse_events.html"><i class="bi bi-calendar-event me-1"></i>Events</a></li>
        <li class="nav-item"><a class="nav-link" href="vote.html"><i class="bi bi-hand-thumbs-up me-1"></i>Vote</a></li>
        <li class="nav-item"><a class="nav-link" href="leaderboard.html"><i class="bi bi-bar-chart me-1"></i>Leaderboard</a></li>
        <li class="nav-item"><a class="nav-link" href="results.html"><i class="bi bi-trophy me-1"></i>Results</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small" id="nav-user-name"></span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
      </div>
    </div>
  </div>
</nav>

<div class="student-hero">
  <div class="container py-3">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="dashboard.html" class="text-white-50 text-decoration-none">Home</a></li>
        <li class="breadcrumb-item text-white active">Browse Events</li>
      </ol>
    </nav>
    <h4 class="fw-700 text-white mt-2 mb-0"><i class="bi bi-calendar-event me-2"></i>Browse Events</h4>
    <p class="text-white-50 mb-0 small">Discover and explore all college events</p>
  </div>
</div>

<div class="container py-4">
  <!-- Filters -->
  <div class="card p-3 mb-4">
    <div class="row g-3 align-items-end">
      <div class="col-md-5">
        <label class="form-label small fw-600">Search Events</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-search"></i></span>
          <input type="text" id="search-input" class="form-control" placeholder="Search by name...">
        </div>
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-600">Category</label>
        <select id="cat-filter" class="form-select">
          <option value="">All Categories</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-600">Status</label>
        <select id="status-filter" class="form-select">
          <option value="">All Status</option>
          <option value="Upcoming">Upcoming</option>
          <option value="Ongoing">Ongoing</option>
          <option value="Completed">Completed</option>
        </select>
      </div>
      <div class="col-md-1">
        <button class="btn btn-primary-custom w-100" onclick="loadEvents()"><i class="bi bi-search"></i></button>
      </div>
    </div>
  </div>

  <div class="row g-4" id="events-grid">
    <div class="col-12 text-center py-5"><div class="spinner-border text-accent"></div></div>
  </div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('student');
if (user) document.getElementById('nav-user-name').textContent = user.full_name;

// Load categories
fetch('../cgi-bin/manage_categories.py?action=get').then(r => r.json()).then(data => {
  if (data.status === 'success') {
    const sel = document.getElementById('cat-filter');
    data.data.forEach(c => sel.innerHTML += `<option value="${c.category_id}">${c.name}</option>`);
  }
});

async function loadEvents() {
  const search = document.getElementById('search-input').value;
  const cat = document.getElementById('cat-filter').value;
  const status = document.getElementById('status-filter').value;

  let url = `../cgi-bin/get_events.py?`;
  if (search) url += `search=${encodeURIComponent(search)}&`;
  if (cat) url += `category_id=${cat}&`;
  if (status) url += `status=${status}`;

  document.getElementById('events-grid').innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-accent"></div></div>';

  try {
    const res = await fetch(url);
    const data = await res.json();
    const grid = document.getElementById('events-grid');

    if (data.status === 'success' && data.data.length > 0) {
      grid.innerHTML = data.data.map((ev, i) => `
        <div class="col-md-6 col-lg-4 fade-in" style="animation-delay:${i*0.08}s">
          <div class="event-card card h-100">
            <img src="../${ev.poster_image || 'uploads/events/default_poster.jpg'}" alt="${ev.title}" class="card-img-top" style="height:200px; object-fit:cover; border-bottom: 2px solid var(--accent);">
            <div class="card-body d-flex flex-column">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <span class="badge rounded-pill" style="background:rgba(123,47,190,0.15);color:var(--accent)">${ev.category_name || 'Event'}</span>
                ${getStatusBadge(ev.status)}
              </div>
              <h5 class="event-title mb-2">${ev.title}</h5>
              <p class="text-muted small flex-grow-1">${(ev.description || '').substring(0, 100)}...</p>
              <div class="d-flex gap-3 small text-muted mb-3">
                <span><i class="bi bi-calendar me-1"></i>${formatDate(ev.event_date)}</span>
                <span><i class="bi bi-geo-alt me-1"></i>${ev.venue || '—'}</span>
              </div>
              <div class="d-flex align-items-center justify-content-between">
                <span class="small text-muted"><i class="bi bi-people me-1"></i>${ev.participant_count || 0} Registered</span>
                <a href="event_detail.html?id=${ev.event_id}" class="btn btn-sm btn-primary-custom">View Details</a>
              </div>
            </div>
          </div>
        </div>`).join('');
    } else {
      grid.innerHTML = `<div class="col-12"><div class="empty-state"><i class="bi bi-calendar-x"></i><h5>No Events Found</h5><p class="text-muted">Try adjusting your filters</p></div></div>`;
    }
  } catch(e) {
    document.getElementById('events-grid').innerHTML = '<div class="col-12 text-center text-danger">Failed to load events</div>';
  }
}

document.getElementById('search-input').addEventListener('input', loadEvents);
document.getElementById('cat-filter').addEventListener('change', loadEvents);
document.getElementById('status-filter').addEventListener('change', loadEvents);

loadEvents();
</script>
</body>
</html>
