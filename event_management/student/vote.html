<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vote — EventStar</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/student.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg student-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="bi bi-stars me-2"></i>EventStar</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list text-white fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link " href="dashboard.html"><i class="bi bi-grid me-1"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="browse_events.html"><i class="bi bi-calendar-event me-1"></i>Events</a></li>
        <li class="nav-item"><a class="nav-link active" href="vote.html"><i class="bi bi-hand-thumbs-up me-1"></i>Vote</a></li>
        <li class="nav-item"><a class="nav-link" href="leaderboard.html"><i class="bi bi-bar-chart me-1"></i>Leaderboard</a></li>
        <li class="nav-item"><a class="nav-link" href="results.html"><i class="bi bi-trophy me-1"></i>Results</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small" id="nav-user-name"></span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
      </div>
    </div>
  </div>
</nav>

<div class="student-hero">
  <div class="container py-3">
    <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a href="dashboard.html" class="text-white-50 text-decoration-none">Home</a></li>
      <li class="breadcrumb-item text-white active">Vote</li>
    </ol></nav>
    <h4 class="fw-700 text-white mt-2 mb-0"><i class="bi bi-hand-thumbs-up me-2"></i>Cast Your Vote</h4>
    <p class="text-white-50 mb-0 small">You can cast 1 vote per event</p>
  </div>
</div>

<div class="container py-4">
  <!-- Event Selector -->
  <div class="card p-3 mb-4">
    <div class="row g-3 align-items-center">
      <div class="col-md-6">
        <label class="form-label fw-600 small">Select Event</label>
        <select id="event-select" class="form-select" onchange="loadParticipants(this.value)">
          <option value="">— Select an event to vote in —</option>
        </select>
      </div>
      <div class="col-md-6" id="voting-status-bar"></div>
    </div>
  </div>

  <div id="participants-section">
    <div class="empty-state">
      <i class="bi bi-hand-thumbs-up"></i>
      <h5>Select an event above to cast your vote</h5>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/vote.js"></script>
<script>
const user = checkAuth('student');
if (user) {
  document.getElementById('nav-user-name').textContent = user.full_name;
  initVoting(user);

  // Load voting-open events
  fetch('../cgi-bin/get_events.py?status=Ongoing').then(r => r.json()).then(data => {
    const sel = document.getElementById('event-select');
    if (data.status === 'success') {
      const openEvents = data.data.filter(e => e.voting_open == 1);
      if (openEvents.length === 0) {
        sel.innerHTML = '<option>No events with open voting</option>';
      } else {
        openEvents.forEach(ev => {
          sel.innerHTML += `<option value="${ev.event_id}">${ev.title}</option>`;
        });
      }
    }
    // Auto-select from URL
    const urlEvent = new URLSearchParams(window.location.search).get('event');
    if (urlEvent) { sel.value = urlEvent; loadParticipants(urlEvent); }
  });
}

async function loadParticipants(eventId) {
  if (!eventId) {
    document.getElementById('participants-section').innerHTML = '<div class="empty-state"><i class="bi bi-hand-thumbs-up"></i><h5>Select an event to vote</h5></div>';
    return;
  }

  document.getElementById('participants-section').innerHTML = '<div class="text-center py-4"><div class="spinner-border text-accent"></div></div>';

  try {
    const [detailRes, votedRes] = await Promise.all([
      fetch(`../cgi-bin/get_event_detail.py?event_id=${eventId}`),
      fetch(`../cgi-bin/check_voted.py?voter_user_id=${user.user_id}&event_id=${eventId}`)
    ]);
    const detail = await detailRes.json();
    const voted = await votedRes.json();

    if (detail.status !== 'success') return;
    const ev = detail.event;

    document.getElementById('voting-status-bar').innerHTML = ev.voting_open
      ? '<span class="live-badge"><span class="live-dot"></span>VOTING OPEN</span>'
      : '<span class="badge bg-danger">Voting Closed</span>';

    if (!ev.voting_open) {
      document.getElementById('participants-section').innerHTML = `
        <div class="alert alert-warning d-flex align-items-center gap-3">
          <i class="bi bi-lock-fill fs-4"></i>
          <div><strong>Voting is closed</strong> for this event. Check back when voting opens!</div>
        </div>`;
      return;
    }

    const parts = detail.participants;
    if (parts.length === 0) {
      document.getElementById('participants-section').innerHTML = '<div class="empty-state"><i class="bi bi-people"></i><p>No approved participants yet</p></div>';
      return;
    }

    const hasVoted = voted.has_voted;
    const votedFor = voted.participant_id;

    if (hasVoted) {
      showToast('You have already voted in this event!', 'info');
    }

    document.getElementById('participants-section').innerHTML = `
      ${hasVoted ? `<div class="alert alert-success mb-4"><i class="bi bi-check-circle me-2"></i>You've already cast your vote! Thanks for participating 🎉</div>` : 
        `<div class="alert alert-info mb-4 d-flex align-items-center gap-2"><i class="bi bi-info-circle"></i>Choose ONE participant to vote for. You can only vote once per event.</div>`}
      <div class="row g-4">
        ${parts.map(p => `
          <div class="col-md-6 col-lg-4">
            <div class="vote-card">
              <div style="height:200px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:4rem">
                ${p.photo ? `<img src="../${p.photo}" alt="${p.full_name}" style="width:100%;height:100%;object-fit:cover">` : '🎭'}
              </div>
              <div class="p-3">
                <h6 class="fw-700 mb-1">${p.full_name}</h6>
                <p class="text-muted small mb-2">${p.performance_title || ''}</p>
                <div class="d-flex align-items-center justify-content-between">
                  <span class="vote-badge"><i class="bi bi-hand-thumbs-up me-1"></i><span id="votes-${p.participant_id}">${p.vote_count}</span> votes</span>
                  <button id="btn-${p.participant_id}"
                    class="btn btn-sm ${hasVoted ? (votedFor == p.participant_id ? 'btn-success' : 'btn-secondary') : 'btn-primary'} vote-btn"
                    data-participant="${p.participant_id}" data-event="${eventId}"
                    ${hasVoted ? 'disabled' : ''}
                    onclick="${hasVoted ? '' : `castVote(${p.participant_id}, ${eventId})`}">
                    ${hasVoted ? (votedFor == p.participant_id ? '<i class="bi bi-check-circle-fill me-1"></i>Your Vote' : '<i class="bi bi-lock me-1"></i>Voted') : '<i class="bi bi-hand-thumbs-up me-1"></i>Vote'}
                  </button>
                </div>
              </div>
            </div>
          </div>`).join('')}
      </div>`;

  } catch(e) {
    document.getElementById('participants-section').innerHTML = '<div class="text-center text-danger">Failed to load participants</div>';
  }
}
</script>
</body>
</html>
