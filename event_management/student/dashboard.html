<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard — EventStar</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/student.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg student-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="bi bi-stars me-2"></i>EventStar</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list text-white fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="dashboard.html"><i class="bi bi-grid me-1"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="browse_events.html"><i class="bi bi-calendar-event me-1"></i>Events</a></li>
        <li class="nav-item"><a class="nav-link" href="vote.html"><i class="bi bi-hand-thumbs-up me-1"></i>Vote</a></li>
        <li class="nav-item"><a class="nav-link" href="leaderboard.html"><i class="bi bi-bar-chart me-1"></i>Leaderboard</a></li>
        <li class="nav-item"><a class="nav-link" href="results.html"><i class="bi bi-trophy me-1"></i>Results</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small" id="nav-user-name"></span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- Welcome Banner -->
<div class="student-hero">
  <div class="container py-3">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item text-white-50">Home</li>
        <li class="breadcrumb-item text-white active">Dashboard</li>
      </ol>
    </nav>
    <h4 class="fw-700 text-white mt-2 mb-0">Welcome back, <span id="welcome-name">Student</span>! 👋</h4>
    <p class="text-white-50 mb-0 small">Here's what's happening at your college</p>
  </div>
</div>

<div class="container py-4">
  <!-- Stat Cards -->
  <div class="row g-3 mb-4">
    <div class="col-md-4 fade-in-1">
      <div class="card admin-stat-card purple h-100">
        <div class="d-flex align-items-center gap-3">
          <div class="stat-icon" style="background: rgba(123,47,190,0.1); width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem"><i class="bi bi-calendar-event text-accent"></i></div>
          <div>
            <h2 class="fw-800 mb-0 text-accent" id="stat-events">—</h2>
            <p class="mb-0 text-muted small">Active Events</p>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-4 fade-in-2">
      <div class="card admin-stat-card gold h-100">
        <div class="d-flex align-items-center gap-3">
          <div class="stat-icon" style="background: rgba(255,180,0,0.1); width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem"><i class="bi bi-hand-thumbs-up" style="color:var(--gold)"></i></div>
          <div>
            <h2 class="fw-800 mb-0" style="color:var(--gold)" id="stat-votes">—</h2>
            <p class="mb-0 text-muted small">Events I Voted In</p>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-4 fade-in-3">
      <div class="card admin-stat-card green h-100">
        <div class="d-flex align-items-center gap-3">
          <div class="stat-icon" style="background: rgba(40,167,69,0.1); width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem"><i class="bi bi-trophy text-success"></i></div>
          <div>
            <h2 class="fw-800 mb-0 text-success" id="stat-results">—</h2>
            <p class="mb-0 text-muted small">Announced Results</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <!-- Featured Events -->
    <div class="col-lg-8">
      <div class="card p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="fw-700 mb-0"><i class="bi bi-calendar-star me-2 text-accent"></i>Featured Events</h6>
          <a href="browse_events.html" class="btn btn-sm btn-outline-primary">View All</a>
        </div>
        <div id="featured-events">
          <div class="text-center py-3"><div class="spinner-border spinner-border-sm text-accent"></div></div>
        </div>
      </div>
    </div>

    <!-- Latest Results -->
    <div class="col-lg-4">
      <div class="card p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="fw-700 mb-0"><i class="bi bi-trophy me-2 text-warning"></i>Latest Result</h6>
          <a href="results.html" class="btn btn-sm btn-outline-warning">See All</a>
        </div>
        <div id="latest-result">
          <div class="text-center py-3"><div class="spinner-border spinner-border-sm text-warning"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('student');
if (user) {
  document.getElementById('welcome-name').textContent = user.full_name.split(' ')[0];
  document.getElementById('nav-user-name').textContent = user.full_name;

  // Load events
  fetch('../cgi-bin/get_events.py').then(r => r.json()).then(data => {
    if (data.status === 'success') {
      const active = data.data.filter(e => e.status === 'Ongoing' || e.status === 'Upcoming');
      document.getElementById('stat-events').textContent = active.length;

      const announced = data.data.filter(e => e.results_announced == 1);
      document.getElementById('stat-results').textContent = announced.length;

      const grid = document.getElementById('featured-events');
      if (active.length === 0) {
        grid.innerHTML = '<div class="empty-state"><i class="bi bi-calendar-x"></i><p>No active events</p></div>';
      } else {
        grid.innerHTML = active.slice(0,3).map(ev => `
          <div class="d-flex align-items-center gap-3 p-2 rounded-3 mb-2" style="background:var(--light-bg)">
            <div class="rounded-3" style="width:48px;height:48px; overflow:hidden; border: 1px solid var(--accent);">
              <img src="../${ev.poster_image || 'uploads/events/default_poster.jpg'}" alt="${ev.title}" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <div class="flex-grow-1 min-w-0">
              <div class="fw-600 small text-truncate">${ev.title}</div>
              <div class="text-muted" style="font-size:0.75rem"><i class="bi bi-calendar me-1"></i>${formatDate(ev.event_date)}</div>
            </div>
            <div class="flex-shrink-0">
              ${getStatusBadge(ev.status)}
              <div class="mt-1">
                ${ev.voting_open ? `<a href="vote.html" class="btn btn-sm btn-primary-custom py-0">Vote</a>` : `<a href="event_detail.html?id=${ev.event_id}" class="btn btn-sm btn-outline-secondary py-0">View</a>`}
              </div>
            </div>
          </div>`).join('');
      }

      // Latest result
      if (announced.length > 0) {
        const ev = announced[0];
        fetch(`../cgi-bin/get_results.py?event_id=${ev.event_id}`).then(r => r.json()).then(rd => {
          if (rd.status === 'success' && rd.data.length > 0) {
            const winner = rd.data[0];
            document.getElementById('latest-result').innerHTML = `
              <div class="winner-card p-3 text-center">
                <div style="font-size:2.5rem">👑</div>
                <h6 class="fw-700">${winner.full_name}</h6>
                <p class="small mb-1">${winner.performance_title || ''}</p>
                <div class="badge bg-dark">Score: ${winner.final_score}</div>
                <div class="small text-muted mt-2">${ev.title}</div>
              </div>
              <div class="mt-2 text-center">
                <a href="results.html" class="btn btn-sm btn-outline-warning">Full Results</a>
              </div>`;
          }
        }).catch(() => {});
      } else {
        document.getElementById('latest-result').innerHTML = '<div class="empty-state"><i class="bi bi-hourglass-split"></i><p>No results yet</p></div>';
      }
    }
  });

  // Vote count - check per event
  fetch('../cgi-bin/get_events.py').then(r => r.json()).then(data => {
    if (data.status === 'success') {
      let voteCount = 0;
      const checks = data.data.map(ev =>
        fetch(`../cgi-bin/check_voted.py?voter_user_id=${user.user_id}&event_id=${ev.event_id}`)
          .then(r => r.json()).then(d => { if (d.has_voted) voteCount++; }).catch(() => {})
      );
      Promise.all(checks).then(() => {
        document.getElementById('stat-votes').textContent = voteCount;
      });
    }
  });
}
</script>
</body>
</html>
