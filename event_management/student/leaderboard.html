<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — EventStar</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
<link href="../css/student.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg student-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="bi bi-stars me-2"></i>EventStar</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list text-white fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-grid me-1"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="browse_events.html"><i class="bi bi-calendar-event me-1"></i>Events</a></li>
        <li class="nav-item"><a class="nav-link" href="vote.html"><i class="bi bi-hand-thumbs-up me-1"></i>Vote</a></li>
        <li class="nav-item"><a class="nav-link active" href="leaderboard.html"><i class="bi bi-bar-chart me-1"></i>Leaderboard</a></li>
        <li class="nav-item"><a class="nav-link" href="results.html"><i class="bi bi-trophy me-1"></i>Results</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small" id="nav-user-name"></span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
      </div>
    </div>
  </div>
</nav>

<div class="student-hero">
  <div class="container py-3">
    <h4 class="fw-700 text-white mt-2 mb-0"><i class="bi bi-bar-chart me-2"></i>Live Leaderboard</h4>
    <p class="text-white-50 mb-0 small">Auto-refreshes every 15 seconds</p>
  </div>
</div>

<div class="container py-4">
  <div class="card p-3 mb-4">
    <div class="row g-3 align-items-center">
      <div class="col-md-5">
        <label class="form-label small fw-600">Select Event</label>
        <select id="event-select" class="form-select" onchange="loadLeaderboard()">
          <option value="">— Choose an event —</option>
        </select>
      </div>
      <div class="col-md-3" id="event-status-badge"></div>
      <div class="col-md-4 text-md-end">
        <small class="text-muted">Next refresh in <span id="countdown">15</span>s</small>
      </div>
    </div>
  </div>

  <div id="leaderboard-section">
    <div class="empty-state"><i class="bi bi-bar-chart"></i><h5>Select an event to view leaderboard</h5></div>
  </div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
const user = checkAuth('student');
let refreshTimer, countdownTimer, countdown = 15;

if (user) {
  document.getElementById('nav-user-name').textContent = user.full_name;

  fetch('../cgi-bin/get_events.py').then(r => r.json()).then(data => {
    if (data.status === 'success') {
      const sel = document.getElementById('event-select');
      data.data.forEach(ev => {
        sel.innerHTML += `<option value="${ev.event_id}" data-status="${ev.status}">${ev.title}</option>`;
      });
    }
    const urlEvent = new URLSearchParams(window.location.search).get('event');
    if (urlEvent) { document.getElementById('event-select').value = urlEvent; loadLeaderboard(); }
  });

  // Auto-refresh
  refreshTimer = setInterval(() => {
    const eid = document.getElementById('event-select').value;
    if (eid) loadLeaderboard(false);
    countdown = 15;
  }, 15000);

  countdownTimer = setInterval(() => {
    countdown--;
    const el = document.getElementById('countdown');
    if (el) el.textContent = countdown;
    if (countdown <= 0) countdown = 15;
  }, 1000);
}

async function loadLeaderboard(showSpinner = true) {
  const eid = document.getElementById('event-select').value;
  if (!eid) return;

  const sel = document.getElementById('event-select');
  const opt = sel.options[sel.selectedIndex];
  const status = opt ? opt.getAttribute('data-status') : '';

  document.getElementById('event-status-badge').innerHTML = status === 'Ongoing'
    ? '<span class="live-badge"><span class="live-dot"></span>LIVE</span>'
    : `${getStatusBadge(status)}`;

  if (showSpinner) document.getElementById('leaderboard-section').innerHTML = '<div class="text-center py-4"><div class="spinner-border text-accent"></div></div>';

  try {
    const res = await fetch(`../cgi-bin/get_leaderboard.py?event_id=${eid}`);
    const data = await res.json();

    if (data.status !== 'success' || data.data.length === 0) {
      document.getElementById('leaderboard-section').innerHTML = '<div class="empty-state"><i class="bi bi-hourglass-split"></i><p>No scores available yet</p></div>';
      return;
    }

    const rows = data.data.map((p, i) => {
      const rankClass = i === 0 ? 'rank-gold' : i === 1 ? 'rank-silver' : i === 2 ? 'rank-bronze' : '';
      const rankBadge = i === 0 ? '<span class="rank-badge rank-1">1</span>' :
                        i === 1 ? '<span class="rank-badge rank-2">2</span>' :
                        i === 2 ? '<span class="rank-badge rank-3">3</span>' :
                        `<span class="rank-badge rank-other">${p.rank}</span>`;
      return `<tr class="${rankClass}">
        <td>${rankBadge}</td>
        <td>
          <div class="d-flex align-items-center gap-2">
            <div class="rounded-circle d-flex align-items-center justify-content-center fw-700 text-white"
              style="width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--accent));font-size:0.85rem;flex-shrink:0">
              ${p.full_name.charAt(0)}
            </div>
            <div>
              <div class="fw-600 small">${p.full_name}</div>
              <div class="text-muted" style="font-size:0.75rem">${p.performance_title || ''}</div>
            </div>
          </div>
        </td>
        <td class="text-center"><span class="score-pill" style="background:rgba(123,47,190,0.1);color:var(--accent)">${p.judge_score.toFixed(1)}</span></td>
        <td class="text-center"><span class="score-pill" style="background:rgba(255,180,0,0.1);color:#8a6600">${p.vote_score.toFixed(1)}</span></td>
        <td class="text-center"><span class="badge bg-dark">${p.final_score.toFixed(2)}</span></td>
      </tr>`;
    }).join('');

    document.getElementById('leaderboard-section').innerHTML = `
      <div class="card">
        <div class="table-responsive">
          <table class="table table-hover mb-0 leaderboard-table">
            <thead style="background:var(--primary);color:white">
              <tr>
                <th style="width:60px">Rank</th>
                <th>Participant</th>
                <th class="text-center">Judge Score</th>
                <th class="text-center">Vote Score</th>
                <th class="text-center">Final Score</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  } catch(e) {}
}
</script>
</body>
</html>
