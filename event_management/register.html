<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — EventStar</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
<style>
  body { background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); min-height: 100vh; }
  .register-card { border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .role-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .photo-upload-area { border: 2px dashed #d0c0e8; border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; transition: var(--transition); }
  .photo-upload-area:hover { border-color: var(--accent); background: rgba(123,47,190,0.05); }
  #preview-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: none; }
</style>
</head>
<body>
<div id="page-loader"><div class="loader-spinner"></div></div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7 col-xl-6">
      <a href="index.html" class="text-white text-decoration-none d-flex align-items-center gap-2 mb-4">
        <i class="bi bi-arrow-left"></i><span>Back to home</span>
      </a>

      <div class="register-card card p-4 p-lg-5">
        <div class="text-center mb-4">
          <i class="bi bi-stars fs-1" style="color: var(--gold)"><b>EventStar</b></i>
          <h4 class="fw-700 mt-2" style="color: var(--primary)">Create Account</h4>
          <p class="text-muted small">Join EventStar and showcase your talent!</p>
        </div>

        <!-- Role Selection -->
        <div class="mb-4">
          <label class="form-label fw-600 small">I want to register as:</label>
          <div class="d-flex gap-3">
            <button type="button" class="btn btn-outline-primary flex-fill role-btn active" id="btn-student" onclick="setRole('student')">
              <i class="bi bi-mortarboard d-block fs-4 mb-1"></i>Student
            </button>
            <button type="button" class="btn btn-outline-primary flex-fill role-btn" id="btn-participant" onclick="setRole('participant')">
              <i class="bi bi-person-badge d-block fs-4 mb-1"></i>Participant
            </button>
          </div>
        </div>

        <form id="register-form" novalidate>
          <input type="hidden" id="reg-role" value="student">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-600 small">Full Name *</label>
              <input type="text" id="reg-name" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600 small">Email Address *</label>
              <input type="email" id="reg-email" class="form-control" placeholder="email@example.com" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600 small">Phone Number</label>
              <input type="tel" id="reg-phone" class="form-control" placeholder="9XXXXXXXXX">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600 small">Password *</label>
              <input type="password" id="reg-password" class="form-control" placeholder="Min 6 characters" required minlength="6">
            </div>
            <div class="col-12">
              <label class="form-label fw-600 small">Confirm Password *</label>
              <input type="password" id="reg-confirm" class="form-control" placeholder="Repeat password" required>
            </div>

            <!-- Participant-only fields -->
            <div id="participant-fields" style="display:none" class="col-12">
              <div class="mb-3">
                <label class="form-label fw-600 small">Bio / About You</label>
                <textarea id="reg-bio" class="form-control" rows="3" placeholder="Tell us about yourself and your talent..."></textarea>
              </div>
              <div>
                <label class="form-label fw-600 small">Profile Photo</label>
                <div class="photo-upload-area" onclick="document.getElementById('reg-photo').click()">
                  <img id="preview-img" src="" alt="Preview">
                  <div id="upload-placeholder">
                    <i class="bi bi-camera fs-3 text-muted d-block mb-2"></i>
                    <p class="text-muted small mb-0">Click to upload photo</p>
                    <p class="text-muted" style="font-size:0.75rem">JPG, PNG up to 5MB</p>
                  </div>
                </div>
                <input type="file" id="reg-photo" accept="image/*" style="display:none" onchange="previewPhoto(this)">
              </div>
            </div>
          </div>

          <div id="reg-error" class="alert alert-danger py-2 small mt-3 d-none"></div>
          <div id="reg-success" class="alert alert-success py-2 small mt-3 d-none"></div>

          <button type="submit" class="btn btn-primary-custom w-100 py-2 fw-600 mt-3" id="reg-btn">
            <i class="bi bi-person-check me-2"></i>Create Account
          </button>
        </form>

        <div class="text-center mt-3">
          <span class="text-muted small">Already have an account? </span>
          <a href="login.html" class="text-decoration-none fw-600" style="color: var(--accent)">Sign In</a>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
function setRole(role) {
  document.getElementById('reg-role').value = role;
  document.getElementById('btn-student').classList.toggle('active', role === 'student');
  document.getElementById('btn-participant').classList.toggle('active', role === 'participant');
  document.getElementById('participant-fields').style.display = role === 'participant' ? 'block' : 'none';
}

function previewPhoto(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('preview-img');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById('upload-placeholder').style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  const role = document.getElementById('reg-role').value;
  const bio = document.getElementById('reg-bio').value.trim();
  const errorEl = document.getElementById('reg-error');
  const successEl = document.getElementById('reg-success');
  const btn = document.getElementById('reg-btn');

  errorEl.classList.add('d-none');
  successEl.classList.add('d-none');

  if (!name || !email || !password) {
    errorEl.textContent = 'Name, email, and password are required';
    errorEl.classList.remove('d-none'); return;
  }
  if (password.length < 6) {
    errorEl.textContent = 'Password must be at least 6 characters';
    errorEl.classList.remove('d-none'); return;
  }
  if (password !== confirm) {
    errorEl.textContent = 'Passwords do not match';
    errorEl.classList.remove('d-none'); return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registering...';

  const formData = new FormData();
  formData.append('full_name', name);
  formData.append('email', email);
  formData.append('phone', phone);
  formData.append('password', password);
  formData.append('role', role);
  formData.append('bio', bio);
  const photoFile = document.getElementById('reg-photo').files[0];
  if (photoFile) formData.append('photo', photoFile);

  try {
    const res = await fetch('cgi-bin/register.py', { method: 'POST', body: formData });
    const data = await res.json();

    if (data.status === 'success') {
      successEl.textContent = 'Registration successful! Redirecting to login...';
      successEl.classList.remove('d-none');
      setTimeout(() => window.location.href = `login.html?role=${role}`, 1500);
    } else {
      errorEl.textContent = data.message || 'Registration failed';
      errorEl.classList.remove('d-none');
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-person-check me-2"></i>Create Account';
    }
  } catch(err) {
    errorEl.textContent = 'Connection error. Is the server running?';
    errorEl.classList.remove('d-none');
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-person-check me-2"></i>Create Account';
  }
});
</script>
</body>
</html>
